/* 顶部分类栏 */

.category-tabs {

.category-tab {

.content-area {

}

       .two-columns {

}
      
        /* 修改后 - 正常显示 */
.sidebar.math-mode {

}
        .content-area {

        }

        .category-bar {

        .sub-tab-bar {

.sub-tab-btn {

    border-radius: 20px;

}

        .questions-list {

        }
        .edit-btn {

            color: #007aff;

        }
        .edit-btn:hover { background: #f2f2f6; }
        .card-body {
            padding: 0 20px 16px 20px;
        }
        
       /* 四线三格样式 - 修正为4条线 */
.four-line-grid {
    display: inline-block;
    margin: 10px 0;
    position: relative;
    width: 140px;
}

.grid-line-1 { /* 第1条线 - 顶线 */
    display: block;
    height: 0;

}

.grid-line-2 { /* 第2条线 - 中上 */

    height: 0;
    border-top: 1px solid #c6c6c8;
    width: 100%;

}

.grid-line-3 { /* 第3条线 - 中下 */
    display: block;
    height: 0;
    border-top: 1px solid #c6c6c8;
    width: 100%;
    margin-bottom: 8px;
}

.grid-line-4 { /* 第4条线 - 底线 */

    height: 0;

}

.pinyin-text {
    font-size: 20px;
    font-weight: 500;
    color: #007aff;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    text-align: center;
    margin-top: 4px;
}
        
       /* 田字格样式 */
.tian-grid {
    display: inline-block;
    width: 60px;
    height: 60px;
    border: 1px solid #c6c6c8;
    position: relative;
    margin: 5px 0;
}
        .tian-grid::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e9e9ef;
        }
        .tian-grid::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #e9e9ef;
        }
        .hanzi-display {
            font-size: 48px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #1c1c1e;
        }
        .special-content {
            background: #f8f9fc;
            border-radius: 16px;
            padding: 16px;
            margin: 12px 0;
        }
        
        .meta-info {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #8e8e93;
            margin-top: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .review-count-clickable {
            cursor: pointer;
            background: #e9e9ef;
            padding: 2px 8px;
            border-radius: 20px;
            transition: 0.1s;
        }
        .review-count-clickable:hover {
            background: #007aff;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: #f9f9fb;
            border-radius: 28px;
            color: #8e8e93;
            font-size: 15px;
        }

        /* 复习模式全屏 */
        .review-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f2f2f6;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s ease;
        }
        .review-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .review-header {
    position: sticky;
    top: 0;
    background: rgba(242,242,246,0.96);
    backdrop-filter: blur(10px);
    padding: 12px 28px;  /* 左右内边距和 .review-list 保持一致 */
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    z-index: 10;
}
        .review-header h2 {
            font-size: 22px;
            font-weight: 600;
        }
       .filter-group {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-wrap: nowrap;
    background: #ffffffcc;
    padding: 4px 12px;
    border-radius: 40px;
}
        .filter-btn {
    background: transparent;
    border: none;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: #3a3a3e;
    white-space: nowrap;
}
        .filter-btn.active {
            background: #007aff;
            color: white;
        }
        .close-review {
            background: #e9e9ef;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
       .review-list {
    padding: 12px 28px 48px;  
    width: 100%;
}
        .review-card {
            background: white;
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 20px 24px;
            border: 0.5px solid #e9e9ef;
        }
        .review-question {
            font-weight: 590;
            font-size: 17px;
            line-height: 1.8;
            white-space: pre-wrap;
            margin-bottom: 16px;
            color: #1c1c1e;
        }
        .review-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .review-stats {
            display: flex;
            gap: 20px;
            align-items: center;
            margin: 12px 0;
            font-size: 12px;
            background: #f8f9fc;
            padding: 8px 12px;
            border-radius: 20px;
            flex-wrap: wrap;
        }
        .review-count-badge {
            background: #007aff10;
            padding: 4px 12px;
            border-radius: 20px;
            color: #007aff;
            font-weight: 500;
            cursor: pointer;
        }
        .review-count-badge:hover {

        .review-action-group {
            display: flex;

        }
        .review-correct-btn {
            background: #34c759;

            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: white;
        }
        .review-wrong-btn {
            background: #ff3b30;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: white;
        }
        .toggle-details-btn {
            background: #e9e9ef;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #007aff;
            margin-top: 6px;
            margin-right: 12px;
        }
   .details-container {
    margin-top: 12px;
    background: #f9f9fb;
    border-radius: 16px;
    padding: 10px 14px;
    display: none;
    max-height: none;
    overflow: visible;
}

.detail-wrong, .detail-correct {
    overflow: visible;
    word-wrap: break-word;
    max-width: 100%;
}

.detail-wrong img, .detail-correct img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    margin: 8px 0;
}


        .details-container.show {
            display: block;
        }
       .detail-wrong {
    background: #fef2f2;
    padding: 10px 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    font-size: 13px;
    white-space: normal;
    word-wrap: break-word;
    border-left: 3px solid #ff3b30;
    line-height: 1.4;
    max-height: none;
    overflow: auto;
}
.detail-correct {
    background: #ecf7ec;
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 13px;
    white-space: normal;
    word-wrap: break-word;
    border-left: 3px solid #34c759;
    line-height: 1.4;
    max-height: none;
    overflow: auto;
}
        .review-empty {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 32px;
            color: #8e8e93;
        }

        /* 编辑弹窗 */
.modal-mask {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(2px);
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    z-index: 1000;
    visibility: hidden;
    opacity: 0;
    transition: 0.2s ease;
}

.modal-mask.active {
    visibility: visible !important;
    opacity: 1 !important;
}
    .modal-container {
    width: 90%;
    max-width: 580px;
    max-height: 85vh;
    background: white;
    border-radius: 32px;
    overflow-y: auto;
    padding: 24px 28px 32px;
    scroll-margin-top: 0;
}
        .modal-container h4 {
            font-size: 22px;
            font-weight: 590;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #3a3a3e;
            display: block;
            margin-bottom: 6px;
        }
        .auto-height-textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 14px;
            border: 0.5px solid #c6c6c8;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            line-height: 1.5;
            min-height: 42px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 14px;
            border: 0.5px solid #c6c6c8;
            font-size: 15px;
        }
        .reason-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .reason-tag {
            background: #f2f2f6;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            color: #3a3a3e;
        }
        .reason-tag.selected {
            background: #007aff;
            color: white;
        }
        .double-input {
            display: flex;
            gap: 14px;
        }
        .double-input > div {
            flex: 1;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 44px;
            font-weight: 590;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-cancel { background: #e9e9ef; color: #1c1c1e; }
        .btn-save { background: #007aff; color: white; }
        
        /* 历史记录弹窗 */
        .history-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            z-index: 3000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: none;
        }
        .history-modal.show {
            display: block;
        }
        .history-modal h5 {
            font-size: 18px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e9e9ef;
        }
        .history-modal-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .history-modal-item {
            padding: 10px 0;
            border-bottom: 0.5px solid #f0f0f4;
            font-size: 13px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2999;
            display: none;
        }
        .modal-overlay.show {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar { width: 120px; }
            .content-area { padding: 16px; }
            .review-header { flex-direction: column; align-items: flex-start; }
            .review-action-group { margin-left: 0; margin-top: 8px; }
        }

.three-input {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.three-input > div {
    flex: 1;
    min-width: 120px;
}
.three-input label {
    font-size: 13px;
    font-weight: 500;
    color: #3a3a3e;
    display: block;
    margin-bottom: 6px;
}
.three-input input,
.three-input select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    border: 0.5px solid #c6c6c8;
    font-size: 14px;
    background: white;
    transition: 0.1s;
    box-sizing: border-box;
}
.three-input input:focus {
    outline: none;
    border-color: #007aff;
    box-shadow: 0 0 0 2px rgba(0,122,255,0.1);
}


/* 统一日期选择框字体 */
input[type="date"] {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    color: #1c1c1e;
}

/* 或者让所有输入框字体统一 */
.three-input input,
.three-input select,
.three-input input[type="date"] {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    color: #1c1c1e;
}


/* 单元选择弹窗 */
.unit-modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border-radius: 28px;
    padding: 24px;
    width: 90%;
    max-width: 320px;
    max-height: 70vh;
    overflow-y: auto;
    z-index: 3000;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    display: none;
}
.unit-modal.show {
    display: block;
}
.unit-modal h5 {
    font-size: 18px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e9e9ef;
    text-align: center;
}
.unit-list {
    max-height: 400px;
    overflow-y: auto;
}
.unit-item {
    padding: 12px 16px;
    margin: 4px 0;
    background: #f2f2f6;
    border-radius: 30px;
    cursor: pointer;
    text-align: center;
    font-size: 14px;
    transition: 0.1s;
}
.unit-item:hover {
    background: #007aff;
    color: white;
}

/* 图片上传相关样式 */
.upload-img-btn {
    background: #f2f2f6;
    border: 0.5px solid #e9e9ef;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    color: #007aff;
    transition: 0.1s;
}
.upload-img-btn:hover {
    background: #e9e9ef;
}
.img-preview-area {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
}
.img-preview-item {
    position: relative;
    display: inline-block;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e9e9ef;
}
.img-preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.img-preview-item .remove-img {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 12px;
    text-align: center;
    line-height: 18px;
    cursor: pointer;
}

/* 图片全宽显示 */
.question-container img, .review-question-area img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 12px;
}

.detail-wrong img, .detail-correct img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 12px;
    margin: 8px 0;
}

/* 卡片内图片容器 */
.question-container {
    width: 100%;
}

/* 复习模式图片 */
.review-card .review-question-area img {
    max-height: 250px;
}

/* 禁用双击缩放 */
body {
    touch-action: manipulation;
}

button, .category-tab, .tab-btn, .edit-btn, .review-correct-btn, .review-wrong-btn, .toggle-details-btn, .filter-btn, .close-review, .add-question-btn-header {
    touch-action: manipulation;
}

/* 修复类别选框聚焦时的黑框问题 */
select:focus, input:focus, textarea:focus {
    outline: none;
   
    
}


/* 批量添加按钮样式 */
.batch-add-btn {
    background: #5856d6;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    margin-left: 12px;
    transition: 0.2s;
}
.batch-add-btn:active { opacity: 0.7; }

/* 批量添加弹窗 */
.batch-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(2px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    visibility: hidden;
    opacity: 0;
    transition: 0.2s ease;
}
.batch-modal.active {
    visibility: visible;
    opacity: 1;
}
.batch-modal-container {
    width: 90%;
    max-width: 500px;
    background: white;
    border-radius: 28px;
    padding: 24px;
}
.batch-modal-container h4 {
    font-size: 20px;
    margin-bottom: 16px;
}
.batch-textarea {
    width: 100%;
    min-height: 200px;
    padding: 12px;
    border-radius: 16px;
    border: 0.5px solid #c6c6c8;
    font-size: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    resize: vertical;
}
.batch-tip {
    font-size: 12px;
    color: #8e8e93;
    margin-top: 8px;
}
.batch-actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
}
.batch-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 30px;
    font-weight: 500;
    border: none;
    cursor: pointer;
}
.batch-cancel { background: #e9e9ef; color: #1c1c1e; }
.batch-confirm { background: #007aff; color: white; }

/* 生字卡片容器 */
.shengzi-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
}

.shengzi-item {
    width: 80px;
    text-align: center;
}

/* 强制调整生字田字格间距 */
.special-content > div {
    gap: 10px !important;
}

.special-content > div > div {
    margin: 0 !important;
}

/* 主界面卡片网格布局 */
.questions-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
}

/* 平板及以上屏幕：每行2张卡片 */
@media (min-width: 768px) {
    .questions-list {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }
}

/* 大屏幕：每行2张 */
@media (min-width: 1024px) {
    .questions-list {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }
}

/* 卡片高度自适应，保持统一 */
.card {
    height: 100%;
    display: flex;
    flex-direction: column;
}

.card-body {
    flex: 1;
}

async function uploadToGitHub(base64Data, fileName) {

function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }
    

function renderPinyinContent(question, wrongAnswer, correctAnswer) {
    // 提取括号前的汉字和括号内的注释（去掉括号）
    let mainHanzi = question;
    let noteText = '';
    const bracketIndex = question.indexOf('（');
    if (bracketIndex > 0) {
        mainHanzi = question.substring(0, bracketIndex);
        let tempNote = question.substring(bracketIndex + 1);
        if (tempNote.endsWith('）')) {
            tempNote = tempNote.slice(0, -1);
        }
        noteText = tempNote;
    }
    // 也处理英文括号
    const englishBracketIndex = question.indexOf('(');
    if (englishBracketIndex > 0 && (bracketIndex === -1 || englishBracketIndex < bracketIndex)) {
        mainHanzi = question.substring(0, englishBracketIndex);
        let tempNote = question.substring(englishBracketIndex + 1);
        if (tempNote.endsWith(')')) {
            tempNote = tempNote.slice(0, -1);
        }
        noteText = tempNote;
    }
    
    // 将主体汉字分开
    const chars = mainHanzi.split('');
    // 将注释文字也分开
    const noteChars = noteText ? noteText.split('') : [];
    
    let html = `
        <div class="special-content">
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;">
    `;
    
    // 主体汉字：正常显示拼音线
    chars.forEach(char => {
        html += `
            <div style="text-align: center;">
                <div class="four-line-grid" style="width: 50px;">
                    <div class="grid-line-1"></div>
                    <div class="grid-line-2"></div>
                    <div class="grid-line-3"></div>
                    <div class="grid-line-4"></div>
                    <div class="pinyin-text" style="visibility: hidden; height: 20px;">&nbsp;</div>
                </div>
                <div style="font-size: 24px; font-weight: 500; margin-top: -24px; color: #1c1c1e;">
                    ${escapeHtml(char)}
                </div>
            </div>
        `;
    });
    
    // 注释文字：文字黑色，拼音线透明
    noteChars.forEach(char => {
        html += `
            <div style="text-align: center;">
                <div class="four-line-grid" style="width: 50px;">
                    <div class="grid-line-1" style="border-top: 1px solid transparent;"></div>
                    <div class="grid-line-2" style="border-top: 1px solid transparent;"></div>
                    <div class="grid-line-3" style="border-top: 1px solid transparent;"></div>
                    <div class="grid-line-4" style="border-top: 1px solid transparent;"></div>

                    ${escapeHtml(char)}
                </div>
            </div>
        `;
    });
    
    html += `
            </div>
        </div>
    `;
    
    return html;
}





function renderShengziContent(question, wrongAnswer, correctAnswer) {
    // 按空格分割成多个部分
    const parts = question.trim().split(/\s+/);
    
    // 收集所有需要显示的项（每个汉字单独一项，每个拼音单独一项）
    let items = [];
    
    for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const hasChinese = [...part].some(char => /[\u4e00-\u9fa5]/.test(char));
        
        if (hasChinese) {
            // 汉字：拆分成单个字符，每个字符单独一项
            const chars = part.split('');
            for (let j = 0; j < chars.length; j++) {
                items.push({ type: 'hanzi', text: chars[j] });
            }
        } else {
            // 拼音：每个拼音单独一项
            items.push({ type: 'pinyin', text: part });
        }
    }
    
    // 将 items 分成左右两半（保持顺序）
    const midIndex = Math.ceil(items.length / 2);
    const leftItems = items.slice(0, midIndex);
    const rightItems = items.slice(midIndex);
    
    // 渲染单项
    const renderItem = (item) => {
        if (item.type === 'hanzi') {
            return `<div style="font-size: 32px; font-weight: normal; color: #1c1c1e; padding-top: 25px;">${escapeHtml(item.text)}</div>`;
        } else {
            return `
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <div style="font-size: 14px; color: #007aff; margin-bottom: 6px;">${escapeHtml(item.text)}</div>
                    <div class="tian-grid" style="width: 60px; height: 60px;">
                        <div class="hanzi-display" style="visibility: hidden;">&nbsp;</div>
                    </div>
                </div>
            `;
        }
    };
    
    // 渲染左右两侧
    const renderSide = (items) => {
        if (items.length === 0) return '<div></div>';
        let html = '';
        for (let i = 0; i < items.length; i++) {
            html += renderItem(items[i]);
        }
        return `<div style="display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; align-items: center;">${html}</div>`;
    };
    
    return `
        <div class="special-content" style="background: #f8f9fc; border-radius: 16px; padding: 20px;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap;">
                ${renderSide(leftItems)}
                ${renderSide(rightItems)}
            </div>
        </div>
    `;
}

    // 分类筛选 - 使用 reviewContextFilter
    if (reviewContextFilter) {
        baseList = baseList.filter(q => q.tag === reviewContextFilter);
        // 如果是基础知识且有二级分类筛选
        if (reviewContextFilter === "基础知识" && reviewContextSubFilter && reviewContextSubFilter !== "全部") {
            baseList = baseList.filter(q => q.subTag === reviewContextSubFilter);
        }
    }
    
    
    else {
        if (currentSubject === "chinese") {
            baseList = baseList.filter(q => q.tag === currentChineseTag);
            if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
                baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
            }
        }
    }
    
    // ========== 核心：做对隐藏，做错推到下周 ==========
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const todayStr = today.toISOString().slice(0, 10);
    
    // 调试：打印所有卡片的 _nextReviewDate
    console.log('=== 所有卡片的复习状态 ===');
    baseList.forEach(q => {
        if (q._nextReviewDate) {
            console.log(`📅 ${q.question.substring(0, 20)} - 下次复习: ${q._nextReviewDate} (今天: ${todayStr})`);
        }
        if (q._mastered) {
            console.log(`✅ ${q.question.substring(0, 20)} - 已掌握`);
        }
    });
    
   // 第一步过滤：只过滤已掌握的

// 第一步过滤：只过滤已掌握的（今日和本月筛选除外）
if (currentFilter !== "today" && currentFilter !== "month") {
    baseList = baseList.filter(q => {
        if (q._mastered === true) {
            console.log(`⏭️ 过滤(已掌握): ${q.question.substring(0, 20)}`);
            return false;
        }
        return true;
    });
} else {
    console.log(`当前筛选模式 ${currentFilter}，跳过已掌握过滤`);
}
// 今日和本月筛选不过滤已掌握的卡片

    
    // 过滤掉会话内临时隐藏的卡片
    baseList = baseList.filter(q => !q._hiddenInCurrentSession);
    
    // ========== 日期筛选 ==========
    const getDateStr = (date) => {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    };
    
// 今日筛选 - 不受复习状态影响
if (currentFilter === "today") {
    // 获取今天的日期
    const now = new Date();
    const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    
    console.log('=== 今日筛选（不受复习状态影响）===');
    console.log('今天日期:', todayStr);
    
    // 注意：今日筛选不过滤 _mastered，只要有卡片的最新时间等于今天就显示
    baseList = baseList.filter(q => {
        // 获取卡片的最新时间
        let latestDate = q.date;
        if (q._nextReviewDate && q._nextReviewDate <= todayStr) {
            latestDate = q._nextReviewDate;
        }
        return latestDate === todayStr;
    });
    
    baseList.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    console.log(`今日筛选结果: ${baseList.length} 条`);
    return baseList;
}

// 本周筛选（周一到周日）
if (currentFilter === "week") {
    const dayOfWeek = today.getDay();
    const diffToMonday = (dayOfWeek === 0 ? 6 : dayOfWeek - 1);
    const monday = new Date(today);
    monday.setDate(today.getDate() - diffToMonday);
    const mondayStr = getDateStr(monday);
    
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const sundayStr = getDateStr(sunday);
    
    console.log(`本周范围: ${mondayStr} ~ ${sundayStr}`);
    
    baseList = baseList.filter(q => {
        // 优先使用 _nextReviewDate（如果存在且 <= 今天）
        // 否则用原日期
        let checkDate = q.date;
        if (q._nextReviewDate && q._nextReviewDate <= todayStr) {
            checkDate = q._nextReviewDate;
        }
        if (!checkDate) return false;
        const inRange = checkDate >= mondayStr && checkDate <= sundayStr;
        if (inRange) {
            console.log(`✅ 本周显示: ${q.question.substring(0, 20)} (判断日期: ${checkDate})`);
        }
        return inRange;
    });
    baseList.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    console.log(`本周筛选结果: ${baseList.length} 条`);
    return baseList;
}
// 下周筛选
if (currentFilter === "nextWeek") {
    const dayOfWeek = today.getDay();
    const diffToNextMonday = (dayOfWeek === 0 ? 1 : 8 - dayOfWeek);
    const nextMonday = new Date(today);
    nextMonday.setDate(today.getDate() + diffToNextMonday);
    const nextMondayStr = getDateStr(nextMonday);
    
    const nextSunday = new Date(nextMonday);
    nextSunday.setDate(nextMonday.getDate() + 6);
    const nextSundayStr = getDateStr(nextSunday);
    
    console.log(`下周范围: ${nextMondayStr} ~ ${nextSundayStr}`);
    
    // 【关键修复】使用 _nextReviewDate 来判断是否在下周显示
    baseList = baseList.filter(q => {
        // 优先使用 _nextReviewDate，如果没有则用原日期
        const checkDate = q._nextReviewDate || q.date;
        if (!checkDate) return false;
        const inRange = checkDate >= nextMondayStr && checkDate <= nextSundayStr;
        if (inRange) {
            console.log(`✅ 下周显示: ${q.question} (判断日期: ${checkDate})`);
        }
        return inRange;
    });
    baseList.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    console.log(`下周筛选结果: ${baseList.length} 条`);
    return baseList;
}



// 本月筛选 - 按原始日期筛选，不过滤已掌握
if (currentFilter === "month") {
    const currentYear = today.getFullYear();
    const currentMonth = today.getMonth() + 1;
    const currentMonthStr = String(currentMonth).padStart(2, '0');
    
    baseList = baseList.filter(q => {
        // 【修改】不过滤已掌握的卡片，本月筛选中全部显示
        // 只按原始日期判断
        if (!q.date) return false;
        const [year, month] = q.date.split('-');
        return year === String(currentYear) && month === currentMonthStr;
    });
    baseList.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    console.log(`本月筛选结果: ${baseList.length} 条 (所有本月卡片)`);
    return baseList;
}


// 单元筛选
    if (currentFilter === "unit" && customUnitKeyword) {
        baseList = baseList.filter(q => q.unit && q.unit.includes(customUnitKeyword));
        baseList.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        return baseList;
    }
    
    // 默认：按日期倒序
    baseList.sort((a, b) => {
        const dateA = a.date || '';
        const dateB = b.date || '';
        return dateB.localeCompare(dateA);
    });
    
    return baseList;
}



function getAllUnits() {
    let baseList = currentSubject === "chinese" ? [...chineseErrors] : [...mathErrors];
    
    // 按当前页面分类筛选
    if (reviewContextFilter) {
        baseList = baseList.filter(q => q.tag === reviewContextFilter);
        if (reviewContextFilter === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
            baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
        }
    } else {
        if (currentSubject === "chinese") {
            baseList = baseList.filter(q => q.tag === currentChineseTag);
            if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
                baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
            }
        }
    }




    
    // 提取所有有单元的项目
    const unitsSet = new Set();
    baseList.forEach(item => {
        if (item.unit && item.unit.trim()) {
            unitsSet.add(item.unit);
        }
    });
    return Array.from(unitsSet).sort();
}

// 打开单元选择弹窗
function openUnitModal(btnElement) {
    const units = getAllUnits();
    const unitListDiv = document.getElementById('unitList');
    
    // 保存当前按钮的引用
    window.currentUnitBtn = btnElement;
    
    if (units.length === 0) {
        unitListDiv.innerHTML = '<div style="text-align: center; padding: 20px; color: #8e8e93;">暂无单元数据</div>';
    } else {
        let html = '';
        units.forEach(unit => {
            html += `<div class="unit-item" onclick="selectUnit('${escapeHtml(unit).replace(/'/g, "\\'")}')">${escapeHtml(unit)}</div>`;
        });
        unitListDiv.innerHTML = html;
    }
    
    document.getElementById('unitModal').classList.add('show');
    document.getElementById('unitOverlay').classList.add('show');
}

// 选择单元并筛选
function selectUnit(unit) {
    closeUnitModal();
    currentFilter = "unit";
    customUnitKeyword = unit;
    
    // 获取该单元下的错题数量
    const allList = currentSubject === "chinese" ? [...chineseErrors] : [...mathErrors];
    let count = 0;
    
    // 根据当前分类筛选
    if (currentSubject === "chinese") {
        let filtered = allList.filter(item => item.tag === currentChineseTag);
        if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
            filtered = filtered.filter(item => item.subTag === currentChineseSubTag);
        }
        count = filtered.filter(item => item.unit === unit).length;
    } else {
        count = allList.filter(item => item.tag === currentMathTag && item.unit === unit).length;
    }
    
    // 修改按钮文字为"单元名称 (数量)"
    if (window.currentUnitBtn) {
        window.currentUnitBtn.innerHTML = `${unit} <span class="filter-count">(${count})</span>`;
        window.currentUnitBtn.classList.add('active');
    }
    
    // 显示清除单元按钮
    const clearUnitBtn = document.getElementById('clearUnitBtn');
    if (clearUnitBtn) {
        clearUnitBtn.style.display = 'inline-block';
    }
    
    // 更新其他按钮的数量统计
    updateFilterCounts();
    
    openReviewWithCurrentFilter();
}

// 清除单元筛选
function clearUnitFilter() {
    currentFilter = "all";
    customUnitKeyword = "";
    
    // 恢复按钮文字为"选择单元 (X个单元)"
    const selectUnitBtn = document.getElementById('selectUnitBtn');
    if (selectUnitBtn) {
        // 重新计算单元总数
        const allList = currentSubject === "chinese" ? [...chineseErrors] : [...mathErrors];
        let filtered = allList;
        if (currentSubject === "chinese") {
            filtered = allList.filter(item => item.tag === currentChineseTag);
            if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
                filtered = filtered.filter(item => item.subTag === currentChineseSubTag);
            }
        } else {
            filtered = allList.filter(item => item.tag === currentMathTag);
        }
        
        const unitsSet = new Set();
        filtered.forEach(item => {
            if (item.unit && item.unit.trim()) {
                unitsSet.add(item.unit);
            }
        });
        selectUnitBtn.innerHTML = `选择单元 <span class="filter-count">(${unitsSet.size}个单元)</span>`;
        selectUnitBtn.classList.remove('active');
    }
    
    // 隐藏清除按钮
    const clearUnitBtn = document.getElementById('clearUnitBtn');
    if (clearUnitBtn) {
        clearUnitBtn.style.display = 'none';
    }
    
    // 移除其他筛选按钮的 active 状态
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // 更新数量统计
    updateFilterCounts();
    
    openReviewWithCurrentFilter();
}

// 更新所有筛选按钮的题目数量
function updateFilterCounts() {
    // 保存当前筛选状态
    const previousFilter = currentFilter;
    const previousUnit = customUnitKeyword;
    
    // 统计今日数量
    currentFilter = "today";
    customUnitKeyword = "";
    const todayList = getFilteredQuestionsForReview();
    const todayCount = document.getElementById('todayCount');
    if (todayCount) todayCount.textContent = `(${todayList.length})`;
    
    // 统计本周数量
    currentFilter = "week";
    const weekList = getFilteredQuestionsForReview();
    const weekCount = document.getElementById('weekCount');
    if (weekCount) weekCount.textContent = `(${weekList.length})`;
    
    // 统计下周数量
    currentFilter = "nextWeek";
    const nextWeekList = getFilteredQuestionsForReview();
    const nextWeekCount = document.getElementById('nextWeekCount');
    if (nextWeekCount) nextWeekCount.textContent = `(${nextWeekList.length})`;
    
    // 统计本月数量
    currentFilter = "month";
    const monthList = getFilteredQuestionsForReview();
    const monthCount = document.getElementById('monthCount');
    if (monthCount) monthCount.textContent = `(${monthList.length})`;
    
    // 统计单元数量
    currentFilter = "all";
    customUnitKeyword = "";
    const allList = getFilteredQuestionsForReview();
    
    // 按单元分组统计
    const unitMap = new Map();
    allList.forEach(item => {
        if (item.unit && item.unit.trim()) {
            const count = unitMap.get(item.unit) || 0;
            unitMap.set(item.unit, count + 1);
        }
    });
    
    // 更新单元数量显示
    const unitCountSpan = document.getElementById('unitCount');
    if (unitCountSpan) {
        // 如果当前选中了具体单元，显示该单元的数量；否则显示单元总数
        if (currentFilter === "unit" && customUnitKeyword) {
            const specificCount = unitMap.get(customUnitKeyword) || 0;
            unitCountSpan.textContent = `(${specificCount})`;
        } else {
            const totalUnits = unitMap.size;
            unitCountSpan.textContent = `(${totalUnits}个单元)`;
        }
    }
    
    // 恢复原来的筛选状态
    currentFilter = previousFilter;
    customUnitKeyword = previousUnit;
}

// 渲染复习编辑弹窗的图片预览
function renderReviewImagePreview(target) {
    const container = document.getElementById(`review${capitalize(target)}ImgPreview`);
    if (!container) return;
    
    const images = reviewTempImages[target] || [];
    if (images.length === 0) {
        container.innerHTML = '';
        return;
    }
    
    let html = '';
    images.forEach((img, idx) => {
        html += `
            <div class="img-preview-item">
                <img src="${img}" alt="预览图">
                <div class="remove-img" data-target="${target}" data-index="${idx}">×</div>
            </div>
        `;
    });
    container.innerHTML = html;
    
    container.querySelectorAll('.remove-img').forEach(el => {
        el.onclick = (e) => {
            e.stopPropagation();
            const t = el.getAttribute('data-target');
            const idx = parseInt(el.getAttribute('data-index'));
            if (reviewTempImages[t] && reviewTempImages[t][idx]) {
                reviewTempImages[t].splice(idx, 1);
                renderReviewImagePreview(t);
            }
        };
    });
}


function saveReviewEdit() {
    console.log('保存按钮被点击', reviewEditingItem);
    
    const { id, subject } = reviewEditingItem;
    if (!id) {
        console.error('没有找到要编辑的题目');
        alert('请重新打开编辑窗口');
        return;
    }
    
    const errorList = subject === "chinese" ? chineseErrors : mathErrors;
    const idx = errorList.findIndex(e => e.id === id);
    
    if (idx === -1) {
        alert("未找到该错题");
        return;
    }
    
    const newQuestion = document.getElementById('reviewEditQuestion').value;
    const newWrong = document.getElementById('reviewEditWrong').value;
    const newCorrect = document.getElementById('reviewEditCorrect').value;
    
    const hasQuestionText = newQuestion && newQuestion.trim();
    const hasQuestionImages = reviewTempImages.question && reviewTempImages.question.length > 0;
    
    if (!hasQuestionText && !hasQuestionImages) {
        alert("请填写原题内容或上传原题图片！");
        return;
    }
    
    errorList[idx] = {
        ...errorList[idx],
        question: newQuestion,
        wrongAnswer: newWrong,
        correctAnswer: newCorrect,
        questionImages: [...reviewTempImages.question],
        wrongImages: [...reviewTempImages.wrong],
        correctImages: [...reviewTempImages.correct]
    };
    
    saveAllDataToLocalStorage();
    renderSidebar();
    renderContent();
    
    if (reviewModal && reviewModal.classList.contains('active')) {
        openReviewWithCurrentFilter();
    }
    
    alert('✅ 保存成功！');
    closeReviewEditModal();
}

// 初始化复习编辑弹窗的上传按钮
function initReviewImageUpload() {
    const targets = ['question', 'wrong', 'correct'];
    targets.forEach(target => {
        const btn = document.querySelector(`.upload-img-btn[data-target="review_${target}"]`);
        const fileInput = document.getElementById(`uploadReview${capitalize(target)}Img`);
        if (btn && fileInput) {
            btn.onclick = () => fileInput.click();
            fileInput.onchange = (e) => handleReviewImageUpload(e, target);
        }
    });
}

// 处理复习编辑弹窗的图片上传
async function handleReviewImageUpload(event, target) {
    const file = event.target.files[0];
    if (!file) return;
    
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件');
        return;
    }
    
    const btn = document.querySelector(`.upload-img-btn[data-target="review_${target}"]`);
    const originalText = btn.textContent;
    btn.textContent = '⏳ 上传中...';
    btn.disabled = true;
    
    try {
        compressImageTo200KB(file, async (compressedBase64) => {
            try {
                const ext = file.name.split('.').pop() || 'jpg';
                const fileName = `images/${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${ext}`;
                const imageUrl = await uploadToGitHub(compressedBase64, fileName);
                
                if (!reviewTempImages[target]) reviewTempImages[target] = [];
                reviewTempImages[target].push(imageUrl);
                renderReviewImagePreview(target);
                
                alert('✅ 图片已上传！');
            } catch (err) {
                alert('❌ 上传失败：' + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
                event.target.value = '';
            }
        });
    } catch (err) {
        alert('❌ 上传失败');
        btn.textContent = originalText;
        btn.disabled = false;
        event.target.value = '';
    }
}

// 图片压缩函数（压缩到200KB以内）
function compressImageTo200KB(file, callback) {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            let quality = 0.7;
            let width = img.width;
            let height = img.height;
            
            // 限制最大宽度为800px
            const maxWidth = 800;
            if (width > maxWidth) {
                height = (height * maxWidth) / width;
                width = maxWidth;
            }
            
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            function tryCompress(q) {
                const dataUrl = canvas.toDataURL('image/jpeg', q);
                // 估算大小（Base64长度 * 0.75 ≈ 字节数）
                const estimatedSize = dataUrl.length * 0.75;
                if (estimatedSize > 200000 && q > 0.3) {
                    tryCompress(q - 0.1);
                } else {
                    callback(dataUrl);
                }
            }
            tryCompress(quality);
        };
        img.src = e.target.result;
    };
}






function dataURItoBlob(dataURI) {
    const byteString = atob(dataURI.split(',')[1]);
    const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
    }
    return new Blob([ab], { type: mimeString });
}



// 处理图片上传 - 压缩后上传到 GitHub
async function handleImageUpload(event, target) {
    const file = event.target.files[0];
    if (!file) return;
    
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件');
        return;
    }
    
    const btn = document.querySelector(`.upload-img-btn[data-target="${target}"]`);
    const originalText = btn.textContent;
    btn.textContent = '⏳ 压缩上传中...';
    btn.disabled = true;
    
    try {
        compressImageTo200KB(file, async (compressedBase64) => {
            try {
                // 生成唯一文件名
                const ext = file.name.split('.').pop() || 'jpg';
                const fileName = `images/${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${ext}`;
                
                // 上传到 GitHub
                const imageUrl = await uploadToGitHub(compressedBase64, fileName);
                
                if (!tempImages[target]) tempImages[target] = [];
                tempImages[target].push(imageUrl);
                renderImagePreview(target);
                
                alert('✅ 图片已上传到 GitHub 云端！');
            } catch (err) {
                console.error('上传错误:', err);
                alert('❌ 上传失败：' + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
                event.target.value = '';
            }
        });
    } catch (err) {
        alert('❌ 压缩失败');
        btn.textContent = originalText;
        btn.disabled = false;
        event.target.value = '';
    }
}

// 保存文字数据到 Gist（强制覆盖云端文件）
async function saveToCloud() {
    if (!GIST_CONFIG.id) {
        console.log('请先配置 GIST_CONFIG.id');
        alert('请先在设置中配置 Gist ID');
        return false;
    }
    
    if (!GIST_CONFIG.token) {
        console.log('请先配置 GitHub Token');
        alert('请先在设置中配置 GitHub Token');
        return false;
    }
    
    const data = {
        chineseErrors: chineseErrors.map(item => ({
            ...item,
            // 确保图片数组被正确保存
            questionImages: item.questionImages || [],
            wrongImages: item.wrongImages || [],
            correctImages: item.correctImages || []
        })),
        mathErrors: mathErrors,
        lastUpdate: new Date().toISOString(),
        version: '2.0'
    };
    
    const content = JSON.stringify(data, null, 2);
    console.log('准备同步，语文错题数:', chineseErrors.length);
    
    // 先获取当前 Gist 中该文件的 sha（如果存在）
    let sha = '';
    try {
        const getResponse = await fetch(`https://api.github.com/gists/${GIST_CONFIG.id}`, {
            headers: { 'Authorization': `token ${GIST_CONFIG.token}` }
        });
        if (getResponse.ok) {
            const gist = await getResponse.json();
            if (gist.files && gist.files[GIST_CONFIG.fileName]) {
                sha = gist.files[GIST_CONFIG.fileName].sha;
                console.log('找到已有文件，sha:', sha);
            }
        }
    } catch (e) {
        console.log('获取 Gist 信息失败，将创建新文件', e);
    }
    
    // 更新/创建文件
    const response = await fetch(`https://api.github.com/gists/${GIST_CONFIG.id}`, {
        method: 'PATCH',
        headers: {
            'Authorization': `token ${GIST_CONFIG.token}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            files: {
                [GIST_CONFIG.fileName]: {
                    content: content,
                    sha: sha || undefined
                }
            }
        })
    });
    
    if (response.ok) {
        console.log('✅ 文字数据已同步到 Gist');
        return true;
    } else {
        const error = await response.json();
        console.error('同步失败:', error);
        throw new Error(error.message || '同步失败');
    }
}

function batchAddQuestions() {
    const input = document.getElementById('batchInput').value;
    if (!input.trim()) {
        alert('请输入要添加的错题');
        return;
    }
    
    const lines = input.split('\n').filter(line => line.trim().length > 0);
    if (lines.length === 0) {
        alert('没有有效内容');
        return;
    }
    
    const todayStr = new Date().toISOString().slice(0, 10);
    const currentGrade = currentGradeFilter;
    const currentUnit = document.getElementById('editUnit') ? document.getElementById('editUnit').value : '';
    
    let addedCount = 0;
    let duplicateCount = 0;
    const existingQuestions = new Set(chineseErrors.map(item => item.question));
    
    lines.forEach(line => {
        const word = line.trim();
        if (!word) return;
        
        if (existingQuestions.has(word)) {
            duplicateCount++;
            console.log(`⏭️ 跳过重复: ${word}`);
            return;
        }
        
        const newId = `ch_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
        const newItem = {
            id: newId,
            tag: '基础知识',
            subTag: currentChineseSubTag === '拼音' ? '拼音' : '生字',
            grade: currentGrade,
            unit: currentUnit,
            question: word,
            wrongAnswer: '',  // 留空
            correctAnswer: '',  // 留空
            reasons: ['需要加强'],
            source: '批量添加',
            createdAt: Date.now(),
            date: todayStr,
            reviewCount: 0,
            reviewHistory: [],
            questionImages: [],
            wrongImages: [],
            correctImages: []
        };
        chineseErrors.push(newItem);
        addedCount++;
        existingQuestions.add(word);
    });
    
    if (addedCount > 0) {
        saveAllDataToLocalStorage();
        renderSidebar();
        renderContent();
        closeBatchModal();
        let msg = `✅ 批量添加了 ${addedCount} 条错题`;
        if (duplicateCount > 0) msg += `，跳过 ${duplicateCount} 条重复`;
        showToast(msg);
    } else if (duplicateCount > 0) {

// 从文件对象处理图片上传
async function handleImageUploadFromFile(file, target) {
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件');
        return;
    }
    
    const btn = document.querySelector(`.upload-img-btn[data-target="${target}"]`);
    const originalText = btn.textContent;
    btn.textContent = '⏳ 上传中...';
    btn.disabled = true;
    
    try {
        compressImageTo200KB(file, async (compressedBase64) => {
            try {
                const ext = file.name.split('.').pop() || 'jpg';
                const fileName = `images/${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${ext}`;
                const imageUrl = await uploadToGitHub(compressedBase64, fileName);
                
                if (!tempImages[target]) tempImages[target] = [];
                tempImages[target].push(imageUrl);
                renderImagePreview(target);
                
                alert('✅ 图片已上传！');
            } catch (err) {
                alert('❌ 上传失败：' + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    } catch (err) {
        alert('❌ 压缩失败');
        btn.textContent = originalText;
        btn.disabled = false;
    }
}

    // 保存设置
    if (saveSettingsBtn) {
        saveSettingsBtn.onclick = () => {
            const newToken = settingsTokenInput.value.trim();
            const newGistId = settingsGistIdInput.value.trim();
            if (newToken) {
                localStorage.setItem('github_token', newToken);
                GITHUB_CONFIG.token = newToken;
                GIST_CONFIG.token = newToken;
            } else {
                localStorage.removeItem('github_token');
                GITHUB_CONFIG.token = '';
                GIST_CONFIG.token = '';
            }
            if (newGistId) {
                localStorage.setItem('gist_id', newGistId);

            } else {

            }

                mathErrors: mathErrors,
                exportTime: new Date().toISOString(),
                version: '1.0'
            };
            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cuotiben_backup_${new Date().toISOString().slice(0,19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('✅ 数据已导出');
        };
    }

    // 导入数据
    if (importDataBtn) {
        importDataBtn.onclick = () => {
            importFileInput.click();
        };
    }

    if (importFileInput) {
        importFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (imported.chineseErrors) {
                        chineseErrors.length = 0;
                        imported.chineseErrors.forEach(item => chineseErrors.push(item));
                    }
                    if (imported.mathErrors) {
                        mathErrors.length = 0;

                    alert('✅ 数据导入成功！');

            reader.readAsText(file);

        <textarea id="batchInput" class="batch-textarea" placeholder="每行一个错题&#10;&#10;拼音模式示例：&#10;汗&#10;晴&#10;情&#10;&#10;生字模式示例：&#10;han&#10;shi&#10;wang"></textarea>
        <div class="batch-tip">💡 每行一个汉字（拼音模式）或一个拼音（生字模式），自动创建错题</div>
        <div class="batch-actions">
            <button class="batch-cancel" onclick="closeBatchModal()">取消</button>
            <button class="batch-confirm" onclick="batchAddQuestions()">批量添加</button>
        </div>
    </div>
</div>


</body>
</html>
