<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>错题本 - 智能复习系统 | 拼音生字专项</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;

            background-color: #f2f2f6;

        }

        .app-wrapper {
            width: 100%;
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: none;
            border-radius: 0;
        }

        .header {
            padding: 20px 28px 12px 28px;
            background: white;
            border-bottom: 0.5px solid #e9e9ef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1c1c1e;
            letter-spacing: -0.3px;
        }
        .header .sub {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 400;
            margin-top: 4px;
        }
        .review-btn-header {
            background: #007aff;
            border: none;
            padding: 8px 22px;
            border-radius: 30px;
            color: white;
            font-weight: 590;
            font-size: 14px;
            cursor: pointer;
            transition: 0.1s;
        }
        .review-btn-header:active { opacity: 0.7; }

        .subject-tabs {
            display: flex;
            gap: 28px;
            padding: 12px 28px 0 28px;
            background: white;
            border-bottom: 0.5px solid #e9e9ef;
        }
        .tab-btn {

            font-weight: 500;
            padding: 10px 0 8px 0;
            background: transparent;
            border: none;
            color: #8e8e93;
            cursor: pointer;
            position: relative;
        }
        .tab-btn.active {
            color: #007aff;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -0.5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #007aff;
            border-radius: 2px;
        }

        .two-columns {
            display: flex;
            flex: 1;
            min-height: 0;
            background: white;
        }
        .sidebar {
            width: 160px;
            flex-shrink: 0;
            background: #ffffff;
            border-right: 0.5px solid #f0f0f4;
            padding-top: 20px;
        }
        .menu-item {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 450;
            color: #3a3a3e;
            cursor: pointer;
            background: white;
            border-left: 3px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;

        .menu-item.active {

            color: #007aff;
            font-weight: 500;
        }
        .menu-review-icon {
            font-size: 12px;
            background: #e9e9ef;
            padding: 2px 8px;
            border-radius: 20px;
            color: #007aff;
            cursor: pointer;
            font-weight: normal;
        }
        .menu-review-icon:hover {
            background: #007aff;
            color: white;
        }
        /* 修改后 - 正常显示 */
.sidebar.math-mode {
    display: block;
}
        .content-area {
            flex: 1;
            background: #ffffff;
            padding: 20px 28px 28px 28px;
            overflow-y: auto;
        }

        .category-bar {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .category-bar h3 {
            font-size: 20px;
            font-weight: 590;
            color: #1c1c1e;
        }
        .category-bar span {
            font-size: 14px;
            color: #8e8e93;
        }

        .sub-tab-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e9e9ef;
        }
        .sub-tab-btn {
            background: none;
            border: none;
            font-size: 14px;
            padding: 6px 0;
            cursor: pointer;
            transition: color 0.1s;
        }
        .sub-tab-btn.active {
            color: #007aff;
            font-weight: 500;
        }
        .sub-tab-btn:not(.active) {
            color: #8e8e93;
            font-weight: 400;
        }

        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            border: 0.5px solid #e9e9ef;
            transition: all 0.1s;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 8px 20px;
        }
        .tag-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .subject-badge {
            font-size: 11px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 30px;
            background: #f2f2f6;
            color: #5c5c5e;
        }
        .error-tag {
            font-size: 11px;
            background: #fef0e6;
            color: #c25a1a;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .edit-btn {
            background: transparent;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #007aff;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .edit-btn:hover { background: #f2f2f6; }
        .card-body {
            padding: 0 20px 16px 20px;
        }
        
       /* 四线三格样式 - 修正为4条线 */
.four-line-grid {
    display: inline-block;
    margin: 10px 0;
    position: relative;
    width: 140px;
}

.grid-line-1 { /* 第1条线 - 顶线 */
    display: block;
    height: 0;
    border-top: 1px solid #8e8e93;
    width: 100%;
    margin-bottom: 8px;
}

.grid-line-2 { /* 第2条线 - 中上 */
    display: block;
    height: 0;
    border-top: 1px solid #c6c6c8;
    width: 100%;
    margin-bottom: 8px;
}

.grid-line-3 { /* 第3条线 - 中下 */
    display: block;
    height: 0;
    border-top: 1px solid #c6c6c8;
    width: 100%;
    margin-bottom: 8px;
}

.grid-line-4 { /* 第4条线 - 底线 */
    display: block;
    height: 0;
    border-top: 1px solid #8e8e93;
    width: 100%;
}

.pinyin-text {
    font-size: 20px;
    font-weight: 500;
    color: #007aff;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    text-align: center;
    margin-top: 4px;
}
        
        /* 田字格样式 */
        .tian-grid {
            display: inline-block;
            width: 80px;
            height: 80px;
            border: 1px solid #c6c6c8;
            position: relative;
            margin: 10px 0;
        }
        .tian-grid::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e9e9ef;
        }
        .tian-grid::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #e9e9ef;
        }
        .hanzi-display {
            font-size: 48px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #1c1c1e;
        }
        .special-content {
            background: #f8f9fc;
            border-radius: 16px;
            padding: 16px;
            margin: 12px 0;
        }
        
        .meta-info {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #8e8e93;
            margin-top: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .review-count-clickable {
            cursor: pointer;
            background: #e9e9ef;
            padding: 2px 8px;
            border-radius: 20px;
            transition: 0.1s;
        }
        .review-count-clickable:hover {
            background: #007aff;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: #f9f9fb;
            border-radius: 28px;
            color: #8e8e93;
            font-size: 15px;
        }

        /* 复习模式全屏 */
        .review-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f2f2f6;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s ease;
        }
        .review-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .review-header {
            position: sticky;
            top: 0;
            background: rgba(242,242,246,0.96);
            backdrop-filter: blur(10px);
            padding: 16px 28px;
            border-bottom: 0.5px solid #e9e9ef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 10;
        }
        .review-header h2 {
            font-size: 22px;
            font-weight: 600;
        }
        .filter-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: #ffffffcc;
            padding: 6px 14px;
            border-radius: 40px;
        }
        .filter-btn {
            background: transparent;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #3a3a3e;
        }
        .filter-btn.active {
            background: #007aff;
            color: white;
        }
        .close-review {
            background: #e9e9ef;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .review-list {
            padding: 24px 28px 48px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .review-card {
            background: white;
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 20px 24px;
            border: 0.5px solid #e9e9ef;
        }
        .review-question {
            font-weight: 590;
            font-size: 17px;
            line-height: 1.8;
            white-space: pre-wrap;
            margin-bottom: 16px;
            color: #1c1c1e;
        }
        .review-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .review-stats {
            display: flex;
            gap: 20px;
            align-items: center;
            margin: 12px 0;
            font-size: 12px;
            background: #f8f9fc;
            padding: 8px 12px;
            border-radius: 20px;
            flex-wrap: wrap;
        }
        .review-count-badge {
            background: #007aff10;
            padding: 4px 12px;
            border-radius: 20px;
            color: #007aff;
            font-weight: 500;
            cursor: pointer;
        }
        .review-count-badge:hover {
            background: #007aff;
            color: white;
        }
        .review-action-group {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }
        .review-correct-btn {
            background: #34c759;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: white;
        }
        .review-wrong-btn {
            background: #ff3b30;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: white;
        }
        .toggle-details-btn {
            background: #e9e9ef;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #007aff;
            margin-top: 6px;
            margin-right: 12px;
        }
        .details-container {
            margin-top: 16px;
            background: #f9f9fb;
            border-radius: 18px;
            padding: 14px 18px;
            display: none;
        }
        .details-container.show {
            display: block;
        }
        .detail-wrong {
            background: #fef2f2;
            padding: 12px 14px;
            border-radius: 14px;
            margin-bottom: 12px;
            font-size: 14px;
            white-space: pre-wrap;
            border-left: 3px solid #ff3b30;
            line-height: 1.6;
        }
        .detail-correct {
            background: #ecf7ec;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 14px;
            white-space: pre-wrap;
            border-left: 3px solid #34c759;
            line-height: 1.6;
        }
        .review-empty {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 32px;
            color: #8e8e93;
        }

        /* 编辑弹窗 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
        }
        .modal-mask.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            width: 90%;
            max-width: 580px;
            max-height: 85vh;
            background: white;
            border-radius: 32px;
            overflow-y: auto;
            padding: 24px 28px 32px;
        }
        .modal-container h4 {
            font-size: 22px;
            font-weight: 590;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #3a3a3e;
            display: block;
            margin-bottom: 6px;
        }
        .auto-height-textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 14px;
            border: 0.5px solid #c6c6c8;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            line-height: 1.5;
            min-height: 80px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 14px;
            border: 0.5px solid #c6c6c8;
            font-size: 15px;
        }
        .reason-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .reason-tag {
            background: #f2f2f6;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            color: #3a3a3e;
        }
        .reason-tag.selected {
            background: #007aff;
            color: white;
        }
        .double-input {
            display: flex;
            gap: 14px;
        }
        .double-input > div {
            flex: 1;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 44px;
            font-weight: 590;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-cancel { background: #e9e9ef; color: #1c1c1e; }
        .btn-save { background: #007aff; color: white; }
        
        /* 历史记录弹窗 */
        .history-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            z-index: 3000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: none;
        }
        .history-modal.show {
            display: block;
        }
        .history-modal h5 {
            font-size: 18px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e9e9ef;
        }
        .history-modal-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .history-modal-item {
            padding: 10px 0;
            border-bottom: 0.5px solid #f0f0f4;
            font-size: 13px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2999;
            display: none;
        }
        .modal-overlay.show {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar { width: 120px; }
            .content-area { padding: 16px; }
            .review-header { flex-direction: column; align-items: flex-start; }
            .review-action-group { margin-left: 0; margin-top: 8px; }
        }

.three-input {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;

}

    flex: 1;

}
.three-input label {
    font-size: 13px;

}

    outline: none;

/* 单元选择弹窗 */
.unit-modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 90%;
    max-width: 320px;

    z-index: 3000;

.unit-modal.show {
    display: block;
}
.unit-modal h5 {
    font-size: 18px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e9e9ef;

}
.unit-list {
    max-height: 400px;

}

    <div class="header">
        <div>
            <h1>毛语宸的错题本</h1>
        
        </div>
        <button class="review-btn-header" id="openReviewBtn">复习模式</button>
    </div>
    <div class="subject-tabs">

    <button class="filter-btn" data-filter="week">本周</button>

</div>
            <button class="close-review" id="closeReviewBtn">关闭复习</button>
        </div>
    </div>

</div>

        <form id="editForm">

   <select id="editTag" style="width: 100%; padding: 10px 12px; border-radius: 12px; border: 0.5px solid #c6c6c8; font-size: 14px; background: white;">

</select>




</div>

            <div class="form-group"><label>原题 / 拼音 / 汉字</label><textarea id="editQuestion" class="auto-height-textarea" placeholder="输入题目内容..."></textarea></div>

            if (m === '>') return '&gt;';
            return m;

function getFilteredQuestionsForReview() {
    let baseList = currentSubject === "chinese" ? [...chineseErrors] : [...mathErrors];
    
    if (reviewContextFilter) {
        baseList = baseList.filter(q => q.tag === reviewContextFilter);
        if (reviewContextFilter === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
            baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
        }
    } else {
        if (currentSubject === "chinese") {
            baseList = baseList.filter(q => q.tag === currentChineseTag);
            if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
                baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
            }
        }
    }
    
    const todayDate = new Date(); todayDate.setHours(0,0,0,0);
    if (currentFilter === "today") {
        return baseList.filter(q => { const d = new Date(q.date); d.setHours(0,0,0,0); return d.getTime() === todayDate.getTime(); });
    }
    if (currentFilter === "week") {
        const startOfWeek = new Date(todayDate); startOfWeek.setDate(todayDate.getDate() - todayDate.getDay());
        return baseList.filter(q => { const d = new Date(q.date); return d >= startOfWeek; });
    }
    if (currentFilter === "month") {
        return baseList.filter(q => { const d = new Date(q.date); return d.getMonth() === todayDate.getMonth() && d.getFullYear() === todayDate.getFullYear(); });
    }
    if (currentFilter === "unit" && customUnitKeyword) {
        return baseList.filter(q => q.unit && q.unit.includes(customUnitKeyword));
    }
    
    return baseList;
}

    if (reviewContextFilter) {
        baseList = baseList.filter(q => q.tag === reviewContextFilter);
        if (reviewContextFilter === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
            baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
        }
    } else {
        if (currentSubject === "chinese") {
            baseList = baseList.filter(q => q.tag === currentChineseTag);
            if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
                baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
            }
        }
    }
    
    // 提取所有有单元的项目
    const unitsSet = new Set();
    baseList.forEach(item => {
        if (item.unit && item.unit.trim()) {
            unitsSet.add(item.unit);
        }
    });
    return Array.from(unitsSet).sort();
}

                            <div style="font-size: 16px; color: #007aff; margin-bottom: 8px;">${escapeHtml(pinyin)}</div>
                            <div class="tian-grid" style="margin: 0 auto;">
                                <div class="hanzi-display" style="visibility: hidden;">&nbsp;</div>
                            </div>
                        </div>
                    `;
                }
                specialContent = `
                    <div class="special-content" style="margin: 12px 0; background: #f8f9fc; border-radius: 16px; padding: 16px;">
                        <div style="text-align: center; display: flex; flex-wrap: wrap; justify-content: center; gap: 16px;">
                            ${tianGridsHtml}
                        </div>
                    </div>
                `;
            } else {
                specialContent = `<div class="review-question" style="margin: 12px 0;">${escapeHtml(item.question)}</div>`;
            }
            
            html += `
                <div class="review-card">
                    <div class="review-meta"><span>${item.tag}${subTagInfo}</span><span>${item.date || '无日期'}</span><span>来源: ${item.source || '未知'}</span><span>单元: ${item.unit || '未标注'}</span><span>原因: ${item.reasons?.join(',') || ''}</span></div>
                    ${specialContent}
                    <div class="review-stats">
                        <span class="review-count-badge" onclick="showHistoryModal('${item.id}', '${currentSubject}')">复习次数: ${item.reviewCount || 0}</span>
                        <span class="last-review">最近复习: ${lastReviewText}</span>
                        <div class="review-action-group">
                            <button class="review-correct-btn" data-id="${item.id}" data-subject="${currentSubject}" data-result="correct">✓ 做对了</button>
                            <button class="review-wrong-btn" data-id="${item.id}" data-subject="${currentSubject}" data-result="wrong">✗ 还是错了</button>
                        </div>
                    </div>
                    <div><button class="toggle-details-btn" data-id="${item.id}">显示答案与解析</button></div>
                    <div id="review-details-${item.id}" class="details-container">
                        <div class="detail-wrong">错误过程：<br>${escapeHtml(item.wrongAnswer || '未记录')}</div>
                        <div class="detail-correct">正确答案/解析：<br>${escapeHtml(item.correctAnswer || '未记录')}</div>
                    </div>
                </div>
            `;
        });
        reviewListContainer.innerHTML = html;
        
        document.querySelectorAll('.toggle-details-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const detailsDiv = document.getElementById(`review-details-${id}`);
                if (detailsDiv) { 
                    detailsDiv.classList.toggle('show'); 
                    btn.textContent = detailsDiv.classList.contains('show') ? '隐藏答案与解析' : '显示答案与解析'; 
                }
            });
        });
        
        document.querySelectorAll('.review-correct-btn, .review-wrong-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const subject = btn.getAttribute('data-subject');
                const result = btn.getAttribute('data-result');
                recordReview(id, subject, result);
            });
        });
    }
    reviewModal.classList.add('active');
}
// 控制二级分类显示/隐藏
function toggleSubTagGroup() {
    const tagSelect = document.getElementById('editTag');
    const subTagGroup = document.getElementById('subTagGroup');
    if (tagSelect.value === '基础知识') {
        subTagGroup.style.display = 'block';
    } else {
        subTagGroup.style.display = 'none';
    }
}

// 根据科目获取类别选项
function getCategoryOptions(subject, currentTag) {
    let optionsHtml = '';
    if (subject === 'chinese') {
        optionsHtml = `
            <optgroup label="📖 语文">
                <option value="基础知识" ${currentTag === '基础知识' ? 'selected' : ''}>基础知识</option>
                <option value="阅读理解" ${currentTag === '阅读理解' ? 'selected' : ''}>阅读理解</option>
                <option value="作文表达" ${currentTag === '作文表达' ? 'selected' : ''}>作文表达</option>
                <option value="文学常识" ${currentTag === '文学常识' ? 'selected' : ''}>文学常识</option>
            </optgroup>
        `;
    } else {
        optionsHtml = `
            <optgroup label="🔢 数学">
                <option value="计算" ${currentTag === '计算' ? 'selected' : ''}>计算</option>
                <option value="应用题" ${currentTag === '应用题' ? 'selected' : ''}>应用题</option>
                <option value="图形" ${currentTag === '图形' ? 'selected' : ''}>图形 / 几何</option>
                <option value="概念" ${currentTag === '概念' ? 'selected' : ''}>概念 / 填空</option>
            </optgroup>
        `;
    }
    return optionsHtml;
}

// 刷新类别下拉框
function refreshCategorySelect(subject, currentTag) {
    const tagSelect = document.getElementById('editTag');
    if (tagSelect) {
        tagSelect.innerHTML = getCategoryOptions(subject, currentTag);
    }
}


function openAddModal() {
    document.querySelector('#editModal .modal-container h4').innerText = "新增错题";
    editingItem = { id: null, subject: currentSubject };
    
    // 清空表单
    document.getElementById("editQuestion").value = "";
    document.getElementById("editWrong").value = "";
    document.getElementById("editCorrect").value = "";
    document.getElementById("editSource").value = "";
    document.getElementById("editUnit").value = "";
    document.getElementById("editGrade").value = currentGradeFilter || "一下";
    document.getElementById("editDate").value = new Date().toISOString().slice(0, 10);
    
    // 动态生成类别选项（根据当前科目）
    let defaultTag = currentSubject === "chinese" ? currentChineseTag : "计算";
    refreshCategorySelect(currentSubject, defaultTag);
    
    // 设置二级分类（仅语文基础知识需要）
    const subTagGroup = document.getElementById('subTagGroup');
    const tagSelect = document.getElementById('editTag');
    if (currentSubject === "chinese" && tagSelect.value === "基础知识") {
        subTagGroup.style.display = 'block';
    } else {
        subTagGroup.style.display = 'none';
    }
    
    // 设置二级分类默认值
    const subTagSelect = document.getElementById('editSubTag');
    if (currentSubject === "chinese" && currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
        subTagSelect.value = currentChineseSubTag;
    } else {
        subTagSelect.value = "拼音";
    }
    
    // 设置错误原因选项
    const opts = currentSubject === "chinese" ? chineseReasonOptions : mathReasonOptions;
    let tagsHtml = "";
    opts.forEach(opt => { tagsHtml += `<div class="reason-tag" data-reason="${opt}">${opt}</div>`; });
    reasonTagsContainer.innerHTML = tagsHtml;
    document.querySelectorAll('.reason-tag').forEach(tag => tag.addEventListener('click', (e) => tag.classList.toggle('selected')));
    editModal.classList.add('active');
    
    // 绑定类别切换事件
    tagSelect.onchange = function() {
        if (currentSubject === "chinese" && tagSelect.value === "基础知识") {
            subTagGroup.style.display = 'block';
        } else {
            subTagGroup.style.display = 'none';
        }
    };
}



function openEditModal(errorId, subject) {
    document.querySelector('#editModal .modal-container h4').innerText = "编辑错题";
    const errorList = subject === "chinese" ? chineseErrors : mathErrors;
    const editItem = errorList.find(err => err.id === errorId);
    if (!editItem) return;
    editingItem = { id: errorId, subject: subject };
    
    document.getElementById("editQuestion").value = editItem.question || "";
    document.getElementById("editWrong").value = editItem.wrongAnswer || "";
    document.getElementById("editCorrect").value = editItem.correctAnswer || "";
    document.getElementById("editSource").value = editItem.source || "";
    document.getElementById("editUnit").value = editItem.unit || "";
    document.getElementById("editDate").value = editItem.date || "";
    document.getElementById("editGrade").value = editItem.grade || "一下";
    
    // 动态生成类别选项
    refreshCategorySelect(subject, editItem.tag || "基础知识");
    
    // 设置二级分类显示/隐藏
    const subTagGroup = document.getElementById('subTagGroup');
    const tagSelect = document.getElementById('editTag');
    if (subject === "chinese" && tagSelect.value === "基础知识") {
        subTagGroup.style.display = 'block';
    } else {
        subTagGroup.style.display = 'none';
    }
    
    // 设置二级分类
    const subTagSelect = document.getElementById('editSubTag');
    if (editItem.subTag) {
        subTagSelect.value = editItem.subTag;
    } else {
        subTagSelect.value = "拼音";
    }
    
    const opts = subject === "chinese" ? chineseReasonOptions : mathReasonOptions;
    const selectedReasons = editItem.reasons || [];
    let tagsHtml = "";
    opts.forEach(opt => { tagsHtml += `<div class="reason-tag ${selectedReasons.includes(opt) ? 'selected' : ''}" data-reason="${opt}">${opt}</div>`; });
    reasonTagsContainer.innerHTML = tagsHtml;
    document.querySelectorAll('.reason-tag').forEach(tag => tag.addEventListener('click', (e) => tag.classList.toggle('selected')));
    editModal.classList.add('active');
    
    // 绑定类别切换事件
    tagSelect.onchange = function() {
        if (subject === "chinese" && tagSelect.value === "基础知识") {
            subTagGroup.style.display = 'block';
        } else {
            subTagGroup.style.display = 'none';
        }
    };
}




function saveEdit() {
    const { id, subject } = editingItem;
    const newQuestion = document.getElementById("editQuestion").value;
    const newWrong = document.getElementById("editWrong").value;
    const newCorrect = document.getElementById("editCorrect").value;
    const newSource = document.getElementById("editSource").value;
    const newUnit = document.getElementById("editUnit").value;
    const newDate = document.getElementById("editDate").value;
    const newTag = document.getElementById("editTag").value;
    const newSubTag = document.getElementById("editSubTag").value;
    const newGrade = document.getElementById("editGrade").value;
    const selected = document.querySelectorAll('#reasonTagsContainer .reason-tag.selected');
    const newReasons = Array.from(selected).map(div => div.getAttribute("data-reason"));
    
    // 原题不能为空
    if (!newQuestion.trim()) {
        alert("请填写原题内容！");
        return;
    }
    
    const errorList = subject === "chinese" ? chineseErrors : mathErrors;
    
    // ========== 重复检测（新增模式时） ==========
    if (id === null) {
        // 检查是否有完全相同的原题
        const isDuplicate = errorList.some(item => item.question === newQuestion);
        if (isDuplicate) {
            alert("⚠️ 这道题已经存在错题本中了！\n请勿重复添加。");
            return;
        }
    }
    // =========================================
    
    if (id === null) {
        // 新增模式：生成新ID
        const newId = subject === "chinese" ? `ch_${Date.now()}` : `math_${Date.now()}`;
        const newItem = {
            id: newId,
            tag: newTag,
            subTag: (newTag === "基础知识") ? newSubTag : undefined,
            grade: newGrade,
            unit: newUnit,
            question: newQuestion,
            wrongAnswer: newWrong,
            correctAnswer: newCorrect,
            reasons: newReasons,
            source: newSource,
            date: newDate,
            reviewCount: 0,
            reviewHistory: []
        };
        errorList.push(newItem);
        alert("✅ 新增错题成功！");
    } else {
        // 编辑模式：更新已有数据（编辑时允许相同内容，因为可能是修改其他字段）
        const idx = errorList.findIndex(e => e.id === id);
        if (idx !== -1) {
            errorList[idx] = { 
                ...errorList[idx], 
                question: newQuestion, 
                wrongAnswer: newWrong, 
                correctAnswer: newCorrect, 
                source: newSource, 
                unit: newUnit, 
                date: newDate, 
                reasons: newReasons,
                tag: newTag,
                subTag: (newTag === "基础知识") ? newSubTag : undefined,
                grade: newGrade
            };
            alert("✅ 编辑成功！");
        }
    }
    
    closeModal(); 
    renderSidebar(); 
    renderContent();
    
    // 如果复习模式打开，刷新复习列表
    if (reviewModal.classList.contains('active')) {
        openReviewWithCurrentFilter();
    }
}


function closeModal() { 
        editModal.classList.remove('active'); 
        editingItem = { id: null, subject: null }; 
    }

    function switchSubject(subject) {
        currentSubject = subject;
        if (subject === "chinese") {
            currentChineseTag = "基础知识";
            currentChineseSubTag = "全部";  
        }
        reviewContextFilter = null;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            if (btn.getAttribute('data-subject') === subject) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderSidebar(); 
        renderContent();
    }

    function init() {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchSubject(btn.getAttribute('data-subject'))));
        cancelBtn.addEventListener('click', closeModal);
        editForm.addEventListener('submit', (e) => { e.preventDefault(); saveEdit(); });
        openReviewBtn.addEventListener('click', () => { 
            reviewContextFilter = null;
            openReviewWithCurrentFilter(); 
        });
        closeReviewBtn.addEventListener('click', () => reviewModal.classList.remove('active'));
        reviewModal.addEventListener('click', (e) => { if (e.target === reviewModal) reviewModal.classList.remove('active'); });
        historyOverlay.addEventListener('click', closeHistoryModal);
        switchSubject('chinese');
        // 单元选择按钮事件
document.getElementById('selectUnitBtn').addEventListener('click', () => {
    openUnitModal();
});

// 点击遮罩关闭弹窗
document.getElementById('unitOverlay').addEventListener('click', closeUnitModal);
    }
    init();
</script>
