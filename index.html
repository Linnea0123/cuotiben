/* 月历弹窗样式 */
.calendar-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 4000;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: 0.2s ease;
}
.calendar-modal.active {
    visibility: visible;
    opacity: 1;
}
.calendar-container {
    width: 95%;
    max-width: 450px;
    max-height: 85vh;
    background: white;
    border-radius: 28px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    overflow-y: auto;
}
.calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
}
.calendar-header h3 {
    font-size: 18px;
    font-weight: 600;
    color: #1c1c1e;
}
.calendar-nav-btn, .calendar-close-btn {
    background: #f2f2f6;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    color: #007aff;
    display: flex;
    align-items: center;
    justify-content: center;
}
.calendar-nav-btn:active, .calendar-close-btn:active {
    opacity: 0.7;
}
.calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    margin-bottom: 12px;
    font-size: 13px;
    color: #8e8e93;
    font-weight: 500;
    padding-bottom: 8px;
    border-bottom: 0.5px solid #e9e9ef;
}
.calendar-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
}
.calendar-day {
    min-height: 65px;
    background: #f8f9fc;
    border-radius: 12px;
    padding: 8px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    transition: all 0.1s;
}
.calendar-day:active {
    transform: scale(0.95);
    background: #e9e9ef;
}
.calendar-day.empty {
    background: transparent;
    cursor: default;
}
.calendar-day.empty:active {
    transform: none;
}
.calendar-day.today {
    background: #007aff20;
    border: 1px solid #007aff;
}
.day-number {
    font-size: 16px;
    font-weight: 600;
    color: #1c1c1e;
    margin-bottom: 4px;
}
.badges-container {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
}
.badge-item {
    display: flex;
    align-items: center;
    gap: 3px;
    background: #ffffffcc;
    padding: 2px 6px;
    border-radius: 20px;
}
.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}
.chinese-dot {
    background: #ffc107;
}
.math-dot {
    background: #34c759;
}
.badge-count {
    font-size: 11px;
    font-weight: 600;
    color: #1c1c1e;
}
.calendar-legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 0.5px solid #e9e9ef;
    font-size: 12px;
    color: #8e8e93;
}
.calendar-legend span {
    display: flex;
    align-items: center;
    gap: 6px;
}
.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}
.legend-dot.chinese {
    background: #ffc107;
}
.legend-dot.math {
    background: #34c759;
}

/* 解决 iOS 状态栏灰色问题 */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: env(safe-area-inset-top, 44px);
    background: #ffffff;
    z-index: 9999;
    pointer-events: none;
}
