/* 月历弹窗样式 */
.calendar-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 4000;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: 0.2s ease;
}
.calendar-modal.active {
    visibility: visible;
    opacity: 1;
}
.calendar-container {
    width: 95%;
    max-width: 450px;
    max-height: 85vh;
    background: white;
    border-radius: 28px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    overflow-y: auto;
}
.calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
}
.calendar-header h3 {
    font-size: 18px;
    font-weight: 600;
    color: #1c1c1e;
}
.calendar-nav-btn, .calendar-close-btn {
    background: #f2f2f6;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    color: #007aff;
    display: flex;
    align-items: center;
    justify-content: center;
}
.calendar-nav-btn:active, .calendar-close-btn:active {
    opacity: 0.7;
}
.calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    margin-bottom: 12px;
    font-size: 13px;
    color: #8e8e93;
    font-weight: 500;
    padding-bottom: 8px;
    border-bottom: 0.5px solid #e9e9ef;
}
.calendar-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
}
.calendar-day {
    min-height: 65px;
    background: #f8f9fc;
    border-radius: 12px;
    padding: 8px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    transition: all 0.1s;
}
.calendar-day:active {
    transform: scale(0.95);
    background: #e9e9ef;
}
.calendar-day.empty {
    background: transparent;
    cursor: default;
}
.calendar-day.empty:active {
    transform: none;
}
.calendar-day.today {
    background: #007aff20;
    border: 1px solid #007aff;
}
.day-number {
    font-size: 16px;
    font-weight: 600;
    color: #1c1c1e;
    margin-bottom: 4px;
}
.badges-container {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
}
.badge-item {
    display: flex;
    align-items: center;
    gap: 3px;
    background: #ffffffcc;
    padding: 2px 6px;
    border-radius: 20px;
}
.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}
.chinese-dot {
    background: #ffc107;
}
.math-dot {
    background: #34c759;
}
.badge-count {
    font-size: 11px;
    font-weight: 600;
    color: #1c1c1e;
}
.calendar-legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 0.5px solid #e9e9ef;
    font-size: 12px;
    color: #8e8e93;
}
.calendar-legend span {
    display: flex;
    align-items: center;
    gap: 6px;
}
.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}
.legend-dot.chinese {
    background: #ffc107;
}
.legend-dot.math {
    background: #34c759;
}

.three-input {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.three-input > div {
    flex: 1;
    min-width: 120px;
}
.three-input label {
    font-size: 13px;
    font-weight: 500;
    color: #3a3a3e;
    display: block;
    margin-bottom: 6px;
}
.three-input input,
.three-input select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    border: 0.5px solid #c6c6c8;
    font-size: 14px;
    background: white;
    transition: 0.1s;
    box-sizing: border-box;
}
.three-input input:focus {
    outline: none;
    border-color: #007aff;
    box-shadow: 0 0 0 2px rgba(0,122,255,0.1);
}


/* 统一日期选择框字体 */
input[type="date"] {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    color: #1c1c1e;
}

/* 或者让所有输入框字体统一 */
.three-input input,
.three-input select,
.three-input input[type="date"] {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    color: #1c1c1e;
}


/* 单元选择弹窗 */
.unit-modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border-radius: 28px;
    padding: 24px;
    width: 90%;
    max-width: 320px;
    max-height: 70vh;
    overflow-y: auto;
    z-index: 3000;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    display: none;
}
.unit-modal.show {
    display: block;
}
.unit-modal h5 {
    font-size: 18px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e9e9ef;
    text-align: center;
}
.unit-list {
    max-height: 400px;
    overflow-y: auto;
}
.unit-item {
    padding: 12px 16px;
    margin: 4px 0;
    background: #f2f2f6;
    border-radius: 30px;
    cursor: pointer;
    text-align: center;
    font-size: 14px;
    transition: 0.1s;
}
.unit-item:hover {
    background: #007aff;
    color: white;
}

/* 图片上传相关样式 */
.upload-img-btn {
    background: #f2f2f6;
    border: 0.5px solid #e9e9ef;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    color: #007aff;
    transition: 0.1s;
}
.upload-img-btn:hover {
    background: #e9e9ef;
}
.img-preview-area {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
}
.img-preview-item {
    position: relative;
    display: inline-block;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e9e9ef;
}
.img-preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.img-preview-item .remove-img {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 12px;
    text-align: center;
    line-height: 18px;
    cursor: pointer;
}

/* 图片全宽显示 */
.question-container img, .review-question-area img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 12px;
}

.detail-wrong img, .detail-correct img {

    max-height: 300px;

    border-radius: 12px;
    margin: 8px 0;
}

}

/* 复习模式图片 */

    max-height: 250px;
}

/* 禁用双击缩放 */

}

    outline: none;
   
    
}

    cursor: pointer;

}
.print-category-filter.active {
    background: #007aff;
    color: white;
}

/* 预览窗口打印样式 */
@media print {
    body.preview-mode {
        margin: 0;
        padding: 0;
    }
}

/* 批量添加按钮样式 */
.batch-add-btn {
    background: #5856d6;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    margin-left: 12px;
    transition: 0.2s;
}
.batch-add-btn:active { opacity: 0.7; }

/* 批量添加弹窗 */
.batch-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(2px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    visibility: hidden;
    opacity: 0;
    transition: 0.2s ease;
}
.batch-modal.active {
    visibility: visible;
    opacity: 1;
}
.batch-modal-container {

    max-width: 500px;

    border-radius: 28px;

}

.batch-tip {
    font-size: 12px;
    color: #8e8e93;
    margin-top: 8px;
}
.batch-actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
}
.batch-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 30px;
    font-weight: 500;
    border: none;
    cursor: pointer;
}
.batch-cancel { background: #e9e9ef; color: #1c1c1e; }
.batch-confirm { background: #007aff; color: white; }

/* 生字卡片容器 */
.shengzi-container {

    justify-content: center;
    gap: 30px;

.shengzi-item {

.questions-list {

function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }
    

function renderPinyinContent(question, wrongAnswer, correctAnswer) {
    // 提取括号前的汉字和括号内的注释（去掉括号）
    let mainHanzi = question;
    let noteText = '';
    
    // 处理中文括号 （）
    const bracketIndex = question.indexOf('（');
    if (bracketIndex > 0) {
        mainHanzi = question.substring(0, bracketIndex);
        let tempNote = question.substring(bracketIndex + 1);
        if (tempNote.endsWith('）')) {
            tempNote = tempNote.slice(0, -1);
        }
        noteText = tempNote;
    }
    // 也处理英文括号 ()
    const englishBracketIndex = question.indexOf('(');
    if (englishBracketIndex > 0 && (bracketIndex === -1 || englishBracketIndex < bracketIndex)) {
        mainHanzi = question.substring(0, englishBracketIndex);
        let tempNote = question.substring(englishBracketIndex + 1);
        if (tempNote.endsWith(')')) {
            tempNote = tempNote.slice(0, -1);
        }
        noteText = tempNote;
    }
    
    // 将主体汉字分开（每个字单独显示四线格）
    const chars = mainHanzi.split('');
    // 注释文字也分开（但只显示汉字，无四线格）
    const noteChars = noteText ? noteText.split('') : [];
    
    let html = `
        <div class="special-content">
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;">
    `;
    
    // 主体汉字：显示四线三格 + 汉字
    chars.forEach(char => {
        html += `
            <div style="text-align: center;">
                <div class="four-line-grid" style="width: 50px;">
                    <div class="grid-line-1"></div>
                    <div class="grid-line-2"></div>
                    <div class="grid-line-3"></div>
                    <div class="grid-line-4"></div>
                    <div class="pinyin-text" style="visibility: hidden; height: 20px;">&nbsp;</div>
                </div>
                <div style="font-size: 24px; font-weight: 500; margin-top: -24px; color: #1c1c1e;">
                    ${escapeHtml(char)}
                </div>
            </div>
        `;
    });
    
    // 注释文字：只显示汉字，没有四线格，也没有括号
    // 加一个小间距分隔
    if (noteChars.length > 0) {
        html += `<div style="display: flex; align-items: flex-end; gap: 2px; margin-left: 4px;">`;
        noteChars.forEach(char => {
            html += `
                <div style="font-size: 24px; font-weight: 500; color: #1c1c1e; padding-bottom: 4px;">
                    ${escapeHtml(char)}
                </div>
            `;
        });
        html += `</div>`;
    }
    
    html += `
            </div>
        </div>
    `;
    
    return html;
}



function renderShengziContent(question, wrongAnswer, correctAnswer) {
    // 按空格分割成多个部分
    const parts = question.trim().split(/\s+/);
    
    // 收集所有需要显示的项（每个汉字单独一项，每个拼音单独一项）
    let items = [];
    
    for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const hasChinese = [...part].some(char => /[\u4e00-\u9fa5]/.test(char));
        
        if (hasChinese) {
            // 汉字：拆分成单个字符，每个字符单独一项
            const chars = part.split('');
            for (let j = 0; j < chars.length; j++) {
                items.push({ type: 'hanzi', text: chars[j] });
            }
        } else {
            // 拼音：每个拼音单独一项
            items.push({ type: 'pinyin', text: part });
        }
    }
    
    // 将 items 分成左右两半（保持顺序）
    const midIndex = Math.ceil(items.length / 2);
    const leftItems = items.slice(0, midIndex);
    const rightItems = items.slice(midIndex);
    
    // 渲染单项
    const renderItem = (item) => {
        if (item.type === 'hanzi') {
            return `<div style="font-size: 32px; font-weight: normal; color: #1c1c1e; padding-top: 25px;">${escapeHtml(item.text)}</div>`;
        } else {
            return `
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <div style="font-size: 14px; color: #007aff; margin-bottom: 6px;">${escapeHtml(item.text)}</div>
                    <div class="tian-grid" style="width: 60px; height: 60px;">

function getFilteredQuestionsForReview() {

                baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
            }
        }
    }
    
    // ========== 核心：做对隐藏，做错推到下周 ==========
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const todayStr = today.toISOString().slice(0, 10);
    
    // 调试：打印所有卡片的 _nextReviewDate
    console.log('=== 所有卡片的复习状态 ===');
    baseList.forEach(q => {
        if (q._nextReviewDate) {
            console.log(`📅 ${q.question.substring(0, 20)} - 下次复习: ${q._nextReviewDate} (今天: ${todayStr})`);
        }
        if (q._mastered) {
            console.log(`✅ ${q.question.substring(0, 20)} - 已掌握`);
        }
    });
    
   // 第一步过滤：只过滤已掌握的

// 第一步过滤：只过滤已掌握的（今日和本月筛选除外）
if (currentFilter !== "today" && currentFilter !== "month") {
    baseList = baseList.filter(q => {
        if (q._mastered === true) {
            console.log(`⏭️ 过滤(已掌握): ${q.question.substring(0, 20)}`);
            return false;
        }
        return true;
    });
} else {
    console.log(`当前筛选模式 ${currentFilter}，跳过已掌握过滤`);
}
// 今日和本月筛选不过滤已掌握的卡片

    
    // 过滤掉会话内临时隐藏的卡片
    baseList = baseList.filter(q => !q._hiddenInCurrentSession);
    
    // ========== 日期筛选 ==========
    const getDateStr = (date) => {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    };
    
// 今日筛选 - 不受复习状态影响
if (currentFilter === "today") {
    // 获取今天的日期
    const now = new Date();
    const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    
    console.log('=== 今日筛选（不受复习状态影响）===');
    console.log('今天日期:', todayStr);
    
    // 注意：今日筛选不过滤 _mastered，只要有卡片的最新时间等于今天就显示
    baseList = baseList.filter(q => {
        // 获取卡片的最新时间
        let latestDate = q.date;
        if (q._nextReviewDate && q._nextReviewDate <= todayStr) {
            latestDate = q._nextReviewDate;
        }
        return latestDate === todayStr;
    });
    
    baseList.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    console.log(`今日筛选结果: ${baseList.length} 条`);
    return baseList;
}

// 本周筛选（周一到周日）
if (currentFilter === "week") {
    const dayOfWeek = today.getDay();
    const diffToMonday = (dayOfWeek === 0 ? 6 : dayOfWeek - 1);
    const monday = new Date(today);
    monday.setDate(today.getDate() - diffToMonday);
    const mondayStr = getDateStr(monday);
    
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const sundayStr = getDateStr(sunday);
    
    console.log(`本周范围: ${mondayStr} ~ ${sundayStr}`);
    
    baseList = baseList.filter(q => {
        // 优先使用 _nextReviewDate（如果存在且 <= 今天）
        // 否则用原日期
        let checkDate = q.date;
        if (q._nextReviewDate && q._nextReviewDate <= todayStr) {
            checkDate = q._nextReviewDate;
        }
        if (!checkDate) return false;
        const inRange = checkDate >= mondayStr && checkDate <= sundayStr;
        if (inRange) {
            console.log(`✅ 本周显示: ${q.question.substring(0, 20)} (判断日期: ${checkDate})`);
        }
        return inRange;
    });
    baseList.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    console.log(`本周筛选结果: ${baseList.length} 条`);
    return baseList;
}
// 下周筛选
if (currentFilter === "nextWeek") {
    const dayOfWeek = today.getDay();
    const diffToNextMonday = (dayOfWeek === 0 ? 1 : 8 - dayOfWeek);
    const nextMonday = new Date(today);
    nextMonday.setDate(today.getDate() + diffToNextMonday);
    const nextMondayStr = getDateStr(nextMonday);
    
    const nextSunday = new Date(nextMonday);
    nextSunday.setDate(nextMonday.getDate() + 6);
    const nextSundayStr = getDateStr(nextSunday);
    
    console.log(`下周范围: ${nextMondayStr} ~ ${nextSundayStr}`);
    
    // 【关键修复】使用 _nextReviewDate 来判断是否在下周显示
    baseList = baseList.filter(q => {
        // 优先使用 _nextReviewDate，如果没有则用原日期
        const checkDate = q._nextReviewDate || q.date;
        if (!checkDate) return false;
        const inRange = checkDate >= nextMondayStr && checkDate <= nextSundayStr;
        if (inRange) {
            console.log(`✅ 下周显示: ${q.question} (判断日期: ${checkDate})`);
        }
        return inRange;
    });
    baseList.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    console.log(`下周筛选结果: ${baseList.length} 条`);
    return baseList;
}



// 本月筛选 - 按原始日期筛选，不过滤已掌握
if (currentFilter === "month") {
    const currentYear = today.getFullYear();
    const currentMonth = today.getMonth() + 1;
    const currentMonthStr = String(currentMonth).padStart(2, '0');
    
    baseList = baseList.filter(q => {
        // 【修改】不过滤已掌握的卡片，本月筛选中全部显示
        // 只按原始日期判断
        if (!q.date) return false;
        const [year, month] = q.date.split('-');
        return year === String(currentYear) && month === currentMonthStr;
    });
    baseList.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    console.log(`本月筛选结果: ${baseList.length} 条 (所有本月卡片)`);
    return baseList;
}


// 单元筛选
    if (currentFilter === "unit" && customUnitKeyword) {
        baseList = baseList.filter(q => q.unit && q.unit.includes(customUnitKeyword));
        baseList.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        return baseList;
    }
    
    // 默认：按日期倒序
    baseList.sort((a, b) => {
        const dateA = a.date || '';
        const dateB = b.date || '';
        return dateB.localeCompare(dateA);
    });
    
    return baseList;
}

function selectUnit(unit) {

    const allList = currentSubject === "chinese" ? [...chineseErrors] : [...mathErrors];

    if (currentSubject === "chinese") {

        count = allList.filter(item => item.tag === currentMathTag && item.unit === unit).length;

}

// 更新所有筛选按钮的题目数量
function updateFilterCounts() {
    // 保存当前筛选状态
    const previousFilter = currentFilter;
    const previousUnit = customUnitKeyword;
    
    // 统计今日数量
    currentFilter = "today";
    customUnitKeyword = "";
    const todayList = getFilteredQuestionsForReview();
    const todayCount = document.getElementById('todayCount');
    if (todayCount) todayCount.textContent = `(${todayList.length})`;
    
    // 统计本周数量
    currentFilter = "week";
    const weekList = getFilteredQuestionsForReview();
    const weekCount = document.getElementById('weekCount');
    if (weekCount) weekCount.textContent = `(${weekList.length})`;
    
    // 统计下周数量
    currentFilter = "nextWeek";
    const nextWeekList = getFilteredQuestionsForReview();
    const nextWeekCount = document.getElementById('nextWeekCount');
    if (nextWeekCount) nextWeekCount.textContent = `(${nextWeekList.length})`;
    
    // 统计本月数量
    currentFilter = "month";
    const monthList = getFilteredQuestionsForReview();
    const monthCount = document.getElementById('monthCount');
    if (monthCount) monthCount.textContent = `(${monthList.length})`;
    
    // 统计单元数量
    currentFilter = "all";
    customUnitKeyword = "";
    const allList = getFilteredQuestionsForReview();
    
    // 按单元分组统计
    const unitMap = new Map();
    allList.forEach(item => {
        if (item.unit && item.unit.trim()) {
            const count = unitMap.get(item.unit) || 0;
            unitMap.set(item.unit, count + 1);
        }
    });
    
    // 更新单元数量显示
    const unitCountSpan = document.getElementById('unitCount');
    if (unitCountSpan) {
        // 如果当前选中了具体单元，显示该单元的数量；否则显示单元总数
        if (currentFilter === "unit" && customUnitKeyword) {
            const specificCount = unitMap.get(customUnitKeyword) || 0;
            unitCountSpan.textContent = `(${specificCount})`;
        } else {
            const totalUnits = unitMap.size;
            unitCountSpan.textContent = `(${totalUnits}个单元)`;
        }
    }
    
    // 恢复原来的筛选状态
    currentFilter = previousFilter;
    customUnitKeyword = previousUnit;
}

// 处理复习编辑弹窗的图片上传
async function handleReviewImageUpload(event, target) {
    const file = event.target.files[0];
    if (!file) return;
    
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件');
        return;
    }
    
    const btn = document.querySelector(`.upload-img-btn[data-target="review_${target}"]`);
    const originalText = btn.textContent;
    btn.textContent = '⏳ 上传中...';
    btn.disabled = true;
    
    try {
        compressImageTo200KB(file, async (compressedBase64) => {
            try {
                const ext = file.name.split('.').pop() || 'jpg';
                const fileName = `images/${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${ext}`;
                const imageUrl = await uploadToGitHub(compressedBase64, fileName);
                
                if (!reviewTempImages[target]) reviewTempImages[target] = [];
                reviewTempImages[target].push(imageUrl);
                renderReviewImagePreview(target);
                
                alert('✅ 图片已上传！');
            } catch (err) {
                alert('❌ 上传失败：' + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
                event.target.value = '';
            }
        });
    } catch (err) {
        alert('❌ 上传失败');
        btn.textContent = originalText;
        btn.disabled = false;
        event.target.value = '';
    }
}

// 首字母大写
function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
}

// 图片压缩函数（压缩到200KB以内）
function compressImageTo200KB(file, callback) {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            let quality = 0.7;
            let width = img.width;
            let height = img.height;
            
            // 限制最大宽度为800px
            const maxWidth = 800;
            if (width > maxWidth) {
                height = (height * maxWidth) / width;
                width = maxWidth;
            }
            
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            function tryCompress(q) {
                const dataUrl = canvas.toDataURL('image/jpeg', q);
                // 估算大小（Base64长度 * 0.75 ≈ 字节数）
                const estimatedSize = dataUrl.length * 0.75;
                if (estimatedSize > 200000 && q > 0.3) {
                    tryCompress(q - 0.1);
                } else {
                    callback(dataUrl);
                }
            }
            tryCompress(quality);
        };
        img.src = e.target.result;
    };
}






function dataURItoBlob(dataURI) {
    const byteString = atob(dataURI.split(',')[1]);
    const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
    }
    return new Blob([ab], { type: mimeString });
}



// 处理图片上传 - 压缩后上传到 GitHub
async function handleImageUpload(event, target) {
    const file = event.target.files[0];
    if (!file) return;
    
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件');
        return;
    }
    
    const btn = document.querySelector(`.upload-img-btn[data-target="${target}"]`);
    const originalText = btn.textContent;
    btn.textContent = '⏳ 压缩上传中...';
    btn.disabled = true;
    
    try {
        compressImageTo200KB(file, async (compressedBase64) => {
            try {
                // 生成唯一文件名
                const ext = file.name.split('.').pop() || 'jpg';
                const fileName = `images/${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${ext}`;
                
                // 上传到 GitHub
                const imageUrl = await uploadToGitHub(compressedBase64, fileName);
                
                if (!tempImages[target]) tempImages[target] = [];
                tempImages[target].push(imageUrl);
                renderImagePreview(target);
                
                alert('✅ 图片已上传到 GitHub 云端！');
            } catch (err) {
                console.error('上传错误:', err);
                alert('❌ 上传失败：' + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
                event.target.value = '';
            }
        });
    } catch (err) {
        alert('❌ 压缩失败');
        btn.textContent = originalText;
        btn.disabled = false;
        event.target.value = '';
    }
}


// 渲染图片预览
function renderImagePreview(target) {
    const container = document.getElementById(`${target}ImgPreview`);
    if (!container) return;
    
    const images = tempImages[target] || [];
    if (images.length === 0) {
        container.innerHTML = '';
        return;
    }
    
    let html = '';
    images.forEach((img, idx) => {
        html += `
            <div class="img-preview-item">
                <img src="${img}" alt="预览图">
                <div class="remove-img" data-target="${target}" data-index="${idx}">×</div>
            </div>
        `;
    });
    container.innerHTML = html;
    
    // 绑定删除事件
    container.querySelectorAll('.remove-img').forEach(el => {
        el.onclick = (e) => {
            e.stopPropagation();
            const t = el.getAttribute('data-target');
            const idx = parseInt(el.getAttribute('data-index'));
            if (tempImages[t] && tempImages[t][idx]) {
                tempImages[t].splice(idx, 1);
                renderImagePreview(t);
            }
        };
    });
}

function renderImagesInCard(images, title = '', size = 'normal') {
    if (!images || images.length === 0) return '';
    
    let html = `<div style="margin-top: 12px; width: 100%;">`;
    if (title) {
        html += `<div style="font-size: 13px; color: #8e8e93; margin-bottom: 8px; font-weight: 500;">📷 ${title}：</div>`;
    }
    
    // 全宽大图模式：图片占满卡片宽度
    if (size === 'full') {
        html += `<div style="display: flex; flex-direction: column; gap: 12px; width: 100%;">`;
        images.forEach((img, idx) => {
            html += `
                <div style="width: 100%; border-radius: 12px; overflow: hidden; background: #f8f9fc; border: 0.5px solid #e9e9ef; cursor: pointer;" onclick="window.open('${img}')">
                    <img src="${img}" style="width: 100%; max-height: 300px; object-fit: contain; display: block;" alt="图片${idx+1}">
                </div>
            `;
        });
        html += `</div>`;
    } 
    // 正常模式：网格排列
    else {
        html += `<div style="display: flex; gap: 10px; flex-wrap: wrap;">`;
        images.forEach((img, idx) => {
            html += `
                <div style="width: 100px; height: 100px; border-radius: 8px; overflow: hidden; border: 0.5px solid #e9e9ef; cursor: pointer;" onclick="window.open('${img}')">
                    <img src="${img}" style="width: 100%; height: 100%; object-fit: cover;" alt="图片${idx+1}">
                </div>
            `;
        });

    }
    
    html += `</div>`;
    return html;
}

            console.log(`⏭️ 跳过重复: ${word}`);
            return;
        }
        
        const newId = `ch_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
        const newItem = {
            id: newId,
            tag: '基础知识',
            subTag: currentChineseSubTag === '拼音' ? '拼音' : '生字',
            grade: currentGrade,
            unit: currentUnit,
            question: word,
            wrongAnswer: '',  // 留空
            correctAnswer: '',  // 留空
            reasons: ['需要加强'],
            source: '批量添加',
            createdAt: Date.now(),
            date: todayStr,
            reviewCount: 0,
            reviewHistory: [],
            questionImages: [],
            wrongImages: [],
            correctImages: []
        };
        chineseErrors.push(newItem);
        addedCount++;
        existingQuestions.add(word);
    });
    
    if (addedCount > 0) {
        saveAllDataToLocalStorage();
        renderSidebar();
        renderContent();
        closeBatchModal();
        let msg = `✅ 批量添加了 ${addedCount} 条错题`;
        if (duplicateCount > 0) msg += `，跳过 ${duplicateCount} 条重复`;
        showToast(msg);
    } else if (duplicateCount > 0) {
        showToast(`⚠️ 所有 ${duplicateCount} 条错题都已存在，未添加`);
    } else {
        alert('添加失败，请检查输入格式');
    }
}

// 打开月历
function openCalendarModal() {
    currentCalendarYear = new Date().getFullYear();
    currentCalendarMonth = new Date().getMonth();
    renderCalendar();
    document.getElementById('calendarModal').classList.add('active');
}

// 关闭月历
function closeCalendarModal() {
    document.getElementById('calendarModal').classList.remove('active');
}

// 上一月
function prevMonth() {
    currentCalendarMonth--;
    if (currentCalendarMonth < 0) {
        currentCalendarMonth = 11;
        currentCalendarYear--;
    }
    renderCalendar();
}

// 下一月
function nextMonth() {
    currentCalendarMonth++;
    if (currentCalendarMonth > 11) {
        currentCalendarMonth = 0;
        currentCalendarYear++;
    }
    renderCalendar();
}

// 按日期筛选
function filterByDate(dateStr, subjectFilter = 'auto') {
    // 获取该日期的错题
    const chineseOnDate = chineseErrors.filter(item => item.date === dateStr);
    const mathOnDate = mathErrors.filter(item => item.date === dateStr);
    
    let displayList = [];
    let displaySubject = '';
    let chineseCount = chineseOnDate.length;
    let mathCount = mathOnDate.length;
    
    if (subjectFilter === 'chinese') {
        displayList = chineseOnDate;
        displaySubject = 'chinese';
    } else if (subjectFilter === 'math') {
        displayList = mathOnDate;
        displaySubject = 'math';
    } else {
        // auto 模式：优先语文，没有则数学
        if (chineseOnDate.length > 0) {
            displayList = chineseOnDate;
            displaySubject = 'chinese';
        } else if (mathOnDate.length > 0) {
            displayList = mathOnDate;
            displaySubject = 'math';
        }
    }
    
    if (displayList.length === 0) {
        alert(`${dateStr} 没有${subjectFilter === 'chinese' ? '语文' : subjectFilter === 'math' ? '数学' : ''}错题记录`);
        return;
    }
    
    // 保存原始状态
    const originalSubject = currentSubject;
    const originalChineseTag = currentChineseTag;
    const originalChineseSubTag = currentChineseSubTag;
    const originalMathTag = currentMathTag;
    const originalGetDisplayList = window.getCurrentDisplayList || getCurrentDisplayList;
    
    // 切换到对应学科
    currentSubject = displaySubject;
    
    // 临时覆盖获取列表的函数
    window.getCurrentDisplayList = function() {
        return displayList;
    };
    
    // 刷新内容
    renderContent();
    
    // 添加恢复提示
    const hint = document.createElement('div');
    const subjectName = displaySubject === 'chinese' ? '语文' : '数学';
    hint.textContent = `📅 ${dateStr} 的${subjectName}错题（共 ${displayList.length} 道）· 点击恢复全部`;
    hint.style.cssText = 'background: #007aff; color: white; padding: 8px 16px; border-radius: 30px; font-size: 12px; text-align: center; margin-bottom: 12px; cursor: pointer;';
    hint.onclick = function() {
        window.getCurrentDisplayList = originalGetDisplayList;
        currentSubject = originalSubject;
        currentChineseTag = originalChineseTag;
        currentChineseSubTag = originalChineseSubTag;
        currentMathTag = originalMathTag;
        renderContent();
        hint.remove();
    };
    
    const contentArea = document.getElementById('contentArea');
    if (contentArea.firstChild) {
        contentArea.insertBefore(hint, contentArea.firstChild);
    } else {
        contentArea.appendChild(hint);
    }
    
    closeCalendarModal();
}

function getPrintTitle() {
    let subjectName = currentSubject === "chinese" ? "语文" : "数学";
    let categoryName = "";
    if (currentSubject === "chinese") {
        categoryName = currentChineseTag;
        if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
            categoryName += " · " + currentChineseSubTag;
        }
    } else {
        categoryName = currentMathTag;
    }
    return `${subjectName} · ${categoryName} 错题本`;
}

                    position: absolute;
                    left: 50%;
                    top: 0;
                    bottom: 0;
                    width: 1px;
                    background: #ddd;
                }
                img {
                    max-width: 100%;
                    max-height: 200px;
                    border-radius: 8px;
                    margin-top: 8px;
                }
                @media print {
                    body {
                        padding: 0;
                        margin: 0.5cm;
                    }
                    .no-print {
                        display: none;
                    }
                }
            </style>
        </head>
        <body>
            <div class="print-header">
                <h1>📚 ${escapeHtml(title)}</h1>
                <p>打印时间：${escapeHtml(now)} | 共 ${list.length} 道错题</p>
            </div>
    `;
    
    // 生成每道题的卡片
    list.forEach((item, idx) => {
        const isMath = item.id && item.id.startsWith('math');
        
        printHtml += `
            <div class="print-card">
                <div class="print-card-header">
                    <span style="font-size: 14px; font-weight: bold; color: #007aff;">第 ${idx + 1} 题</span>
                    <span style="font-size: 12px; color: #888;">${escapeHtml(item.date || '无日期')} | ${escapeHtml(item.source || '未知来源')}</span>
                </div>
        `;
        
        // ========== 原题区域 ==========
        printHtml += `<div class="print-question">`;
        printHtml += `<div class="print-question-label">📖 原题：</div>`;
        
        // 拼音分类：四线三格格式
        if (item.tag === "基础知识" && item.subTag === "拼音" && item.question) {
            const chars = item.question.split('');
            printHtml += `<div style="display: flex; flex-wrap: wrap; gap: 16px; justify-content: flex-start;">`;
            chars.forEach(char => {
                printHtml += `
                    <div class="four-line-grid-print">
                        <div class="grid-line-print">
                            <div class="line1"></div>
                            <div class="line2"></div>
                            <div class="line3"></div>
                            <div class="line4"></div>
                        </div>
                        <div style="font-size: 28px; font-weight: 500; margin-top: -28px;">${escapeHtml(char)}</div>
                    </div>
                `;
            });
            printHtml += `</div>`;
        }
        // 生字分类：田字格格式
        else if (item.tag === "基础知识" && item.subTag === "生字" && item.question) {
            const parts = item.question.trim().split(/\s+/);
            let hanzi = '';
            let pinyinParts = [];
            for (let i = 0; i < parts.length; i++) {
                if (/[\u4e00-\u9fa5]/.test(parts[i])) {
                    hanzi += parts[i];
                } else {
                    pinyinParts.push(parts[i]);
                }
            }
            printHtml += `<div style="display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">`;
            printHtml += `<div style="font-size: 36px; font-weight: normal;">${escapeHtml(hanzi)}</div>`;
            printHtml += `<div style="display: flex; gap: 16px; flex-wrap: wrap;">`;
            pinyinParts.forEach(p => {
                printHtml += `
                    <div class="tian-grid-print">
                        <div style="font-size: 14px; color: #007aff; margin-bottom: 6px;">${escapeHtml(p)}</div>
                        <div class="tian-box"></div>
                    </div>
                `;
            });
            printHtml += `</div></div>`;
        }
        // 笔顺分类
        else if (item.tag === "基础知识" && item.subTag === "笔顺" && item.question) {
            printHtml += `<div style="font-size: 32px; font-weight: 600; text-align: center; letter-spacing: 8px; padding: 20px; background: #f8f9fc; border-radius: 12px;">${escapeHtml(item.question)}</div>`;
        }
        // 数学题目：居中放大
        else if (isMath && item.question) {
            printHtml += `<div style="font-size: 28px; font-weight: 600; text-align: center; padding: 20px; background: #f8f9fc; border-radius: 12px;">${escapeHtml(item.question)}</div>`;
        }
        // 普通文本
        else if (item.question) {
            printHtml += `<div style="font-size: 16px; line-height: 1.6; padding: 12px; background: #f8f9fc; border-radius: 12px;">${escapeHtml(item.question)}</div>`;
        }
        
        // 原题图片
        if (item.questionImages && item.questionImages.length > 0) {
            item.questionImages.forEach(img => {
                printHtml += `<div style="margin-top: 8px;"><img src="${img}" alt="原题图片"></div>`;
            });
        }
        printHtml += `</div>`;
        
        // ========== 错误答案区域 ==========
        printHtml += `
            <div class="print-wrong">
                <div style="font-size: 13px; font-weight: bold; color: #ff3b30; margin-bottom: 6px;">❌ 错误答案 / 过程：</div>
                <div style="font-size: 14px; line-height: 1.5;">${escapeHtml(item.wrongAnswer || '未记录')}</div>
        `;
        if (item.wrongImages && item.wrongImages.length > 0) {
            item.wrongImages.forEach(img => {
                printHtml += `<img src="${img}" alt="错误答案图片">`;
            });
        }
        printHtml += `</div>`;
        
        // ========== 正确答案区域（拼音和生字不重复显示） ==========
        const skipCorrect = (item.tag === "基础知识" && (item.subTag === "拼音" || item.subTag === "生字"));
        if (!skipCorrect) {
            printHtml += `
                <div class="print-correct">
                    <div style="font-size: 13px; font-weight: bold; color: #34c759; margin-bottom: 6px;">✅ 正确答案 / 解析：</div>

            `;
            if (item.correctImages && item.correctImages.length > 0) {
                item.correctImages.forEach(img => {
                    printHtml += `<img src="${img}" alt="正确答案图片">`;
                });
            }
            printHtml += `</div>`;
        }
        
        // ========== 错误原因和元信息 ==========
        const reasonText = item.reasons?.length ? item.reasons.join("、") : "未标注";
        printHtml += `
            <div class="print-meta">
                <span>📌 错误原因：${escapeHtml(reasonText)}</span>
                <span style="margin-left: 20px;">📚 单元：${escapeHtml(item.unit || '未标注')}</span>
                <span style="margin-left: 20px;">🔄 复习次数：${item.reviewCount || 0}</span>
            </div>
        `;
        
        printHtml += `</div>`;
    });
    
    printHtml += `
            <div class="print-footer">
                错题本打印 | 温故而知新
            </div>
            <script>
                // 页面加载完成后自动调出打印机
                window.onload = function() {
                    window.print();
                };
            <\/script>
        </body>
        </html>
    `;
    
    // 打开新窗口，写入内容，然后自动调出打印机
    const printWindow = window.open('', '_blank');
    printWindow.document.write(printHtml);
    printWindow.document.close();
}

// ========== 打印设置功能 ==========
let currentPrintFilter = "current"; // current, all, chinese, math

// 获取打印筛选后的列表
function getPrintFilteredList() {
    let list = [];
    
    // 1. 根据分类筛选
    if (currentPrintFilter === "current") {
        if (currentSubject === "chinese") {
            list = chineseErrors.filter(item => item.tag === currentChineseTag);
            if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
                list = list.filter(item => item.subTag === currentChineseSubTag);
            }
        } else {
            list = mathErrors.filter(item => item.tag === currentMathTag);
        }
    } else if (currentPrintFilter === "all") {
        list = [...chineseErrors, ...mathErrors];
    } else if (currentPrintFilter === "chinese") {
        list = [...chineseErrors];
    } else if (currentPrintFilter === "math") {
        list = [...mathErrors];
    }
    
    // 2. 日期范围筛选（关键修复：正确判断空值）
    const startDate = document.getElementById('printStartDate')?.value;
    const endDate = document.getElementById('printEndDate')?.value;
    
    // 只有当至少有一个日期有值时才进行筛选
    const hasStartDate = startDate && startDate !== '';
    const hasEndDate = endDate && endDate !== '';
    
    if (hasStartDate || hasEndDate) {
        list = list.filter(item => {
            const itemDate = item.date || '';
            if (!itemDate) return false;  // 没有日期的题目，在有日期筛选时排除
            
            if (hasStartDate && itemDate < startDate) return false;
            if (hasEndDate && itemDate > endDate) return false;
            return true;
        });
    }
    
    // 3. 排序
    const sortBy = document.getElementById('printSortBy')?.value;
    if (sortBy === 'date_desc') {
        list.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    } else if (sortBy === 'date_asc') {
        list.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    } else if (sortBy === 'review_desc') {
        list.sort((a, b) => (b.reviewCount || 0) - (a.reviewCount || 0));
    } else if (sortBy === 'review_asc') {
        list.sort((a, b) => (a.reviewCount || 0) - (b.reviewCount || 0));
    }
    
    console.log('getPrintFilteredList 返回数量:', list.length);
    return list;
}

}

function generatePrintCard(item, idx, options) {
    const isMath = item.id && item.id.startsWith('math');
    
    let html = '<div class="print-card" style="margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px;">';

    html += '</div>';
    
    // 原题
    if (options.question) {
        if (item.tag === "基础知识" && item.subTag === "拼音" && item.question) {
            var chars = item.question.split('');
            html += '<div class="special-content" style="background: #f8f9fc; border-radius: 16px; padding: 20px; margin: 12px 0;">';
            html += '<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">';
            for (var i = 0; i < chars.length; i++) {
                html += '<div style="text-align: center;">';
                html += '<div class="four-line-grid" style="display: inline-block; width: 80px; margin: 10px 0;">';
                html += '<div class="grid-line-1" style="border-top: 1px solid #333; margin-bottom: 8px;"></div>';
                html += '<div class="grid-line-2" style="border-top: 1px solid #999; margin-bottom: 8px;"></div>';
                html += '<div class="grid-line-3" style="border-top: 1px solid #999; margin-bottom: 8px;"></div>';
                html += '<div class="grid-line-4" style="border-top: 1px solid #333; margin-bottom: 8px;"></div>';
                html += '<div class="pinyin-text" style="visibility: hidden; height: 20px;">&nbsp;</div>';
                html += '</div>';
                html += '<div style="font-size: 40px; font-weight: 500; margin-top: -30px; color: #1c1c1e;">' + escapeHtml(chars[i]) + '</div>';
                html += '</div>';
            }
            html += '</div></div>';
        }
        else if (item.question) {
            html += '<div style="font-size: 14px; line-height: 1.5; margin: 12px 0;">' + escapeHtml(item.question) + '</div>';
        }
        
        if (item.questionImages && item.questionImages.length > 0) {
            for (var i = 0; i < item.questionImages.length; i++) {
                html += '<img src="' + item.questionImages[i] + '" style="max-width:100%; max-height:150px;">';
            }
        }
    }
    
    // 错误答案
    if (options.wrong && item.wrongAnswer) {
        html += '<div style="margin-top: 8px; padding: 8px; background: #fff5f5; border-left: 3px solid #ff3b30; font-size: 12px;">';
        html += '<strong style="color:#ff3b30;">❌ 错误：</strong> ' + escapeHtml(item.wrongAnswer);
        if (item.wrongImages && item.wrongImages.length > 0) {
            for (var i = 0; i < item.wrongImages.length; i++) {
                html += '<img src="' + item.wrongImages[i] + '" style="max-width:100%; max-height:100px;">';
            }
        }
        html += '</div>';
    }
    
    // 正确答案（拼音不重复显示）
    var skipCorrect = (item.tag === "基础知识" && item.subTag === "拼音");
    if (options.correct && !skipCorrect && item.correctAnswer) {
        html += '<div style="margin-top: 6px; padding: 8px; background: #f0fff0; border-left: 3px solid #34c759; font-size: 12px;">';
        html += '<strong style="color:#34c759;">✅ 正确：</strong> ' + escapeHtml(item.correctAnswer);
        if (item.correctImages && item.correctImages.length > 0) {
            for (var i = 0; i < item.correctImages.length; i++) {
                html += '<img src="' + item.correctImages[i] + '" style="max-width:100%; max-height:100px;">';
            }
        }
        html += '</div>';
    }
    
    // 错误原因
    if (options.reason && item.reasons && item.reasons.length) {
        html += '<div style="font-size: 10px; color: #888; margin-top: 6px;">📌 原因：' + escapeHtml(item.reasons.join('、')) + '</div>';

    if (options.meta) {
        html += '<div style="font-size: 10px; color: #aaa; margin-top: 8px; padding-top: 6px; border-top: 1px dashed #ddd;">';
        if(item.unit) html += '单元：' + escapeHtml(item.unit);
        if(item.reviewCount) html += ' | 复习：' + item.reviewCount + '次';
        html += '</div>';
    }
    
    html += '</div>';
    return html;
}

function generatePrintCard(item, idx, options) {

            cardClass += ' print-card-pinyin';
        } else if (item.subTag === "生字") {
            cardClass += ' print-card-shengzi';
        } else if (item.subTag === "笔顺") {
            cardClass += ' print-card-bishun';
        }
    } else if (isMath) {
        cardClass += ' print-card-math';
    }
    
    let html = '<div class="' + cardClass + '" style="page-break-inside: avoid; break-inside: avoid; margin-bottom: 16px;">';
    html += '<div class="print-card-header" style="display: flex; justify-content: flex-start; align-items: center; gap: 12px; margin-bottom: 4px;">';
    html += '<span style="font-size: 10px; font-weight: normal; color: #999;">第 ' + idx + ' 题</span>';
    html += '<span style="font-size: 10px; color: #bbb;">' + escapeHtml(item.date || '无日期') + '</span>';
    html += '</div>';
    
    // 原题
    if (options.question) {
        html += '<div class="print-question" style="margin-top: 0;">';
        
        if (item.tag === "基础知识" && item.subTag === "拼音" && item.question) {
            var chars = item.question.split('');
            html += '<div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: flex-start;">';
            for (var i = 0; i < chars.length; i++) {
                html += '<div style="text-align: center;">';
                html += '<div style="width: 50px;"><div style="border-top:1px solid #333;margin-bottom:6px;"></div>';
                html += '<div style="border-top:1px solid #999;margin-bottom:6px;"></div>';
                html += '<div style="border-top:1px solid #999;margin-bottom:6px;"></div>';
                html += '<div style="border-top:1px solid #333;margin-bottom:6px;"></div></div>';
                html += '<div style="font-size: 22px; margin-top:-22px;">' + escapeHtml(chars[i]) + '</div></div>';
            }
            html += '</div>';
        }
        else if (item.tag === "基础知识" && item.subTag === "生字" && item.question) {
            var parts = item.question.trim().split(/\s+/);
            var hanzi = '';
            var pinyinParts = [];
            for (var i = 0; i < parts.length; i++) {
                if (/[\u4e00-\u9fa5]/.test(parts[i])) {
                    hanzi += parts[i];
                } else {
                    pinyinParts.push(parts[i]);
                }
            }
            html += '<div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">';
            html += '<div style="font-size: 28px;">' + escapeHtml(hanzi) + '</div>';
            html += '<div style="display: flex; gap: 10px; flex-wrap: wrap;">';
            for (var i = 0; i < pinyinParts.length; i++) {
                html += '<div style="text-align: center;">';
                html += '<div style="font-size: 11px; color: #007aff;">' + escapeHtml(pinyinParts[i]) + '</div>';
                html += '<div style="width: 45px; height: 45px; border:1px solid #999; position:relative;"></div></div>';
            }
            html += '</div></div>';
        }
        else if (item.question) {
            html += '<div style="font-size: 14px; line-height: 1.5;">' + escapeHtml(item.question) + '</div>';
        }
        
        if (item.questionImages && item.questionImages.length > 0) {
            for (var i = 0; i < item.questionImages.length; i++) {
                html += '<img src="' + item.questionImages[i] + '" style="max-width:100%; max-height:120px; margin-top:6px;">';
            }
        }
        html += '</div>';
    }
    
    // 错误答案
    if (options.wrong) {
        html += '<div style="margin-top: 8px; padding: 6px; background: #fff5f5; border-left: 3px solid #ff3b30; font-size: 11px;">';
        html += '<strong style="color:#ff3b30;">❌ 错误：</strong> ' + escapeHtml(item.wrongAnswer || '未记录');
        if (item.wrongImages && item.wrongImages.length > 0) {
            for (var i = 0; i < item.wrongImages.length; i++) {
                html += '<img src="' + item.wrongImages[i] + '" style="max-width:100%; max-height:80px; margin-top:4px;">';
            }
        }
        html += '</div>';
    }
    
    // 正确答案（拼音生字不重复）
    var skipCorrect = (item.tag === "基础知识" && (item.subTag === "拼音" || item.subTag === "生字"));
    if (options.correct && !skipCorrect && item.correctAnswer) {
        html += '<div style="margin-top: 6px; padding: 6px; background: #f0fff0; border-left: 3px solid #34c759; font-size: 11px;">';
        html += '<strong style="color:#34c759;">✅ 正确：</strong> ' + escapeHtml(item.correctAnswer);
        if (item.correctImages && item.correctImages.length > 0) {
            for (var i = 0; i < item.correctImages.length; i++) {
                html += '<img src="' + item.correctImages[i] + '" style="max-width:100%; max-height:80px; margin-top:4px;">';
            }
        }
        html += '</div>';
    }
    
    // 错误原因
    if (options.reason) {
        var reasonText = (item.reasons && item.reasons.length) ? item.reasons.join("、") : "未标注";
        html += '<div style="font-size: 10px; color: #888; margin-top: 4px;">📌 原因：' + escapeHtml(reasonText) + '</div>';
    }
    
    // 元信息
    if (options.meta) {
        html += '<div style="font-size: 9px; color: #aaa; margin-top: 4px; padding-top: 4px; border-top: 1px dashed #ddd;">';
        html += '单元：' + escapeHtml(item.unit || '未标注') + ' | 复习：' + (item.reviewCount || 0) + '次';
        if (item.source) html += ' | 来源：' + escapeHtml(item.source);
        html += '</div>';
    }
    
    html += '</div>';
    return html;
}


function bindPrintModalButtonsForce() {
    console.log('bindPrintModalButtonsForce 执行（使用事件委托）');
    
    const modal = document.getElementById('printSettingsModal');
    if (!modal) return;
    
    // ========== 使用事件委托，避免重复绑定 ==========
    // 移除旧的事件监听器（如果有）
    if (modal._delegateHandler) {
        modal.removeEventListener('click', modal._delegateHandler);
        modal.removeEventListener('change', modal._delegateChangeHandler);
    }
    
    // 创建委托处理器
    modal._delegateHandler = function(e) {
        const target = e.target;
        
        // 分类筛选按钮
       // 在分类筛选按钮的点击事件中，修改为：
if (target.classList && target.classList.contains('print-category-filter')) {
    e.preventDefault();
    e.stopPropagation();
    
    document.querySelectorAll('.print-category-filter').forEach(btn => {
        btn.classList.remove('active');
    });
    target.classList.add('active');
    currentPrintFilter = target.getAttribute('data-filter');
    
    // 更新分类详情（使用最新的 currentChineseSubTag）
    const detailDiv = document.getElementById('printCategoryDetail');
    if (detailDiv) {
        let subjectName = currentSubject === "chinese" ? "语文" : "数学";
        let categoryName = currentSubject === "chinese" ? currentChineseTag : currentMathTag;
        if (currentSubject === "chinese" && currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
            categoryName += " · " + currentChineseSubTag;
        }
        detailDiv.innerHTML = `当前：${subjectName} · ${categoryName}`;
    }
    
    updatePrintStats();
    return;
}
        // 取消按钮
        if (target.id === 'cancelPrintBtn' || target.closest('#cancelPrintBtn')) {
            e.preventDefault();
            e.stopPropagation();
            const m = document.getElementById('printSettingsModal');
            if (m) m.classList.remove('active');
            return;
        }
        
        // 确认打印按钮
        if (target.id === 'confirmPrintBtn' || target.closest('#confirmPrintBtn')) {
            e.preventDefault();
            e.stopPropagation();
            if (typeof executePrint === 'function') executePrint();
            return;
        }
        
        // 清除日期范围按钮
        if (target.id === 'clearDateRange' || target.closest('#clearDateRange')) {
            e.preventDefault();
            e.stopPropagation();
            const startDate = document.getElementById('printStartDate');
            const endDate = document.getElementById('printEndDate');
            if (startDate) startDate.value = '';
            if (endDate) endDate.value = '';
            if (typeof updatePrintStats === 'function') updatePrintStats();
            return;
        }
    };
    
    // 处理 change 事件（下拉框、日期选择）
    modal._delegateChangeHandler = function(e) {
        const target = e.target;
        // 日期范围变化时更新统计
        if (target.id === 'printStartDate' || target.id === 'printEndDate' ||
            target.id === 'printSortBy' || target.id === 'printColumns' ||
            target.id === 'printOrientation') {
            if (typeof updatePrintStats === 'function') {
                setTimeout(() => updatePrintStats(), 10);
            }
        }
    };
    
    modal.addEventListener('click', modal._delegateHandler);
    modal.addEventListener('change', modal._delegateChangeHandler);
    
    // 同时确保纸张方向和列数下拉框不受干扰
    const orientationSelect = document.getElementById('printOrientation');
    const columnsSelect = document.getElementById('printColumns');
    const sortSelect = document.getElementById('printSortBy');
    
    // 移除可能的内联禁用属性
    [orientationSelect, columnsSelect, sortSelect].forEach(select => {
        if (select) {
            select.removeAttribute('disabled');
            select.style.pointerEvents = 'auto';
            select.style.opacity = '1';
        }
    });
    
    // 日期输入框同样处理
    const startDate = document.getElementById('printStartDate');
    const endDate = document.getElementById('printEndDate');
    if (startDate) {
        startDate.removeAttribute('disabled');
        startDate.style.pointerEvents = 'auto';
    }
    if (endDate) {
        endDate.removeAttribute('disabled');
        endDate.style.pointerEvents = 'auto';
    }
}

// 从文件对象处理图片上传
async function handleImageUploadFromFile(file, target) {
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件');
        return;
    }
    
    const btn = document.querySelector(`.upload-img-btn[data-target="${target}"]`);
    const originalText = btn.textContent;
    btn.textContent = '⏳ 上传中...';
    btn.disabled = true;
    
    try {
        compressImageTo200KB(file, async (compressedBase64) => {
            try {
                const ext = file.name.split('.').pop() || 'jpg';
                const fileName = `images/${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${ext}`;
                const imageUrl = await uploadToGitHub(compressedBase64, fileName);
                
                if (!tempImages[target]) tempImages[target] = [];
                tempImages[target].push(imageUrl);
                renderImagePreview(target);
                
                alert('✅ 图片已上传！');
            } catch (err) {
                alert('❌ 上传失败：' + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    } catch (err) {
        alert('❌ 压缩失败');
        btn.textContent = originalText;
        btn.disabled = false;
    }
}

        e.stopPropagation();

    });
}

// 修复右上角的"删除"按钮
const deleteInModalBtn = document.getElementById('deleteInModalBtn');
if (deleteInModalBtn) {
    const newDeleteBtn = deleteInModalBtn.cloneNode(true);
    deleteInModalBtn.parentNode.replaceChild(newDeleteBtn, deleteInModalBtn);

            const id = editingItem.id;

        }
    });
}

// 点击遮罩关闭弹窗
const editModal = document.getElementById('editModal');
if (editModal) {

}

<script>
(function() {
    // 监听弹窗打开，自动更新数量
    const modal = document.getElementById('printSettingsModal');
    if (!modal) return;
    
    const observer = new MutationObserver(function(mutations) {
        if (modal.classList.contains('active')) {
            // 计算当前分类的错题数量
            let count = 0;
            if (currentPrintFilter === "current") {
                if (currentSubject === "chinese") {
                    let filtered = chineseErrors.filter(item => item.tag === currentChineseTag);
                    if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
                        filtered = filtered.filter(item => item.subTag === currentChineseSubTag);
                    }
                    count = filtered.length;
                } else if (currentSubject === "math") {
                    count = mathErrors.filter(item => item.tag === currentMathTag).length;
                }
            } else if (currentPrintFilter === "all") {
                count = chineseErrors.length + mathErrors.length;
            } else if (currentPrintFilter === "chinese") {
                count = chineseErrors.length;
            } else if (currentPrintFilter === "math") {
                count = mathErrors.length;
            }
            
            const countSpan = document.getElementById('printCount');
            if (countSpan) {
                countSpan.innerText = count;
                console.log('自动更新打印数量为:', count);
            }
        }
    });
    
    observer.observe(modal, { attributes: true });
    console.log('打印数量自动更新脚本已启动');
})();
</script>
