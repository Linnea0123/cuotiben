<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>错题本 - 智能复习系统 | 拼音生字专项</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background-color: #f2f2f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
        }

        .app-wrapper {
            width: 100%;
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: none;
            border-radius: 0;
        }

        .header {
    padding: 20px 28px 4px 28px;
    background: white;
    display: flex;
    justify-content: space-between;  /* 靠右对齐 */
    align-items: center;
    flex-wrap: wrap;
}
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1c1c1e;
            letter-spacing: -0.3px;
        }
        .header .sub {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 400;
            margin-top: 4px;
        }
        .review-btn-header {
    display: inline-block;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 20px;
    background: #007aff;
    color: white;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
}
        .review-btn-header:active { opacity: 0.7; }

        .subject-tabs {
            display: flex;
            gap: 28px;
            padding: 12px 28px 0 28px;
            background: white;
            border-bottom: 0.5px solid #e9e9ef;
        }
        .tab-btn {
            font-size: 17px;
            font-weight: 500;
            padding: 10px 0 8px 0;
            background: transparent;
            border: none;
            color: #8e8e93;
            cursor: pointer;
            position: relative;
        }
        .tab-btn.active {
            color: #007aff;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -0.5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #007aff;
            border-radius: 2px;
        }
/* 顶部分类栏 */

.category-tabs {
    display: flex;
    gap: 4px;
    padding: 6px 12px 6px 20px;  
    background: white;
    
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
}
.category-tab {
    display: inline-block;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 20px;
    background: #f2f2f6;
    color: #3a3a3e;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
}
.category-tabs::-webkit-scrollbar {
    display: none;
}

.category-tab.active {
    background: #007aff;
    color: white;
}

.content-area {
    flex: 1;
    background: #ffffff;
    padding: 20px 28px 28px 28px;
    overflow-y: auto;
}

       .two-columns {
    display: flex;
    flex: 1;
    min-height: 0;
    background: white;
    flex-direction: column;
}
      
        /* 修改后 - 正常显示 */
.sidebar.math-mode {
    display: block;
}
        .content-area {
            flex: 1;
            background: #ffffff;
            padding: 20px 28px 28px 28px;
            overflow-y: auto;
        }

        .category-bar {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .category-bar h3 {
            font-size: 20px;
            font-weight: 590;
            color: #1c1c1e;
        }
        .category-bar span {
            font-size: 14px;
            color: #8e8e93;
        }

        
        .sub-tab-bar {
    display: flex;
    gap: 4px;
    padding: 6px 12px 6px 20px; 
    background: white;
    border-bottom: 0.5px solid #e9e9ef;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
}

.sub-tab-btn {
    display: inline-block;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 20px;
    background: #f2f2f6;
    color: #3a3a3e;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    border: none;
}

.sub-tab-btn.active {
    background: #007aff;
    color: white;
}

        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            border: 0.5px solid #e9e9ef;
            transition: all 0.1s;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 8px 20px;
        }
        .tag-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .subject-badge {
            font-size: 11px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 30px;
            background: #f2f2f6;
            color: #5c5c5e;
        }
        .error-tag {
            font-size: 11px;
            background: #fef0e6;
            color: #c25a1a;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .edit-btn {
            background: transparent;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #007aff;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .edit-btn:hover { background: #f2f2f6; }
        .card-body {
            padding: 0 20px 16px 20px;
        }
        
       /* 四线三格样式 - 修正为4条线 */
.four-line-grid {
    display: inline-block;
    margin: 10px 0;
    position: relative;
    width: 140px;
}

.grid-line-1 { /* 第1条线 - 顶线 */
    display: block;
    height: 0;
    border-top: 1px solid #8e8e93;
    width: 100%;
    margin-bottom: 8px;
}

.grid-line-2 { /* 第2条线 - 中上 */
    display: block;
    height: 0;
    border-top: 1px solid #c6c6c8;
    width: 100%;
    margin-bottom: 8px;
}

.grid-line-3 { /* 第3条线 - 中下 */
    display: block;
    height: 0;
    border-top: 1px solid #c6c6c8;
    width: 100%;
    margin-bottom: 8px;
}

.grid-line-4 { /* 第4条线 - 底线 */
    display: block;
    height: 0;
    border-top: 1px solid #8e8e93;
    width: 100%;
}

.pinyin-text {
    font-size: 20px;
    font-weight: 500;
    color: #007aff;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    text-align: center;
    margin-top: 4px;
}
        
       /* 田字格样式 */
.tian-grid {
    display: inline-block;
    width: 60px;
    height: 60px;
    border: 1px solid #c6c6c8;
    position: relative;
    margin: 5px 0;
}
        .tian-grid::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e9e9ef;
        }
        .tian-grid::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #e9e9ef;
        }
        .hanzi-display {
            font-size: 48px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #1c1c1e;
        }
        .special-content {
            background: #f8f9fc;
            border-radius: 16px;
            padding: 16px;
            margin: 12px 0;
        }
        
        .meta-info {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #8e8e93;
            margin-top: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .review-count-clickable {
            cursor: pointer;
            background: #e9e9ef;
            padding: 2px 8px;
            border-radius: 20px;
            transition: 0.1s;
        }
        .review-count-clickable:hover {
            background: #007aff;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: #f9f9fb;
            border-radius: 28px;
            color: #8e8e93;
            font-size: 15px;
        }

        /* 复习模式全屏 */
        .review-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f2f2f6;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s ease;
        }
        .review-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .review-header {
    position: sticky;
    top: 0;
    background: rgba(242,242,246,0.96);
    backdrop-filter: blur(10px);
    padding: 12px 28px;  /* 左右内边距和 .review-list 保持一致 */
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    z-index: 10;
}
        .review-header h2 {
            font-size: 22px;
            font-weight: 600;
        }
       .filter-group {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-wrap: nowrap;
    background: #ffffffcc;
    padding: 4px 12px;
    border-radius: 40px;
}
        .filter-btn {
    background: transparent;
    border: none;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: #3a3a3e;
    white-space: nowrap;
}
        .filter-btn.active {
            background: #007aff;
            color: white;
        }
        .close-review {
            background: #e9e9ef;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
       .review-list {
    padding: 12px 28px 48px;  
    width: 100%;
}
        .review-card {
            background: white;
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 20px 24px;
            border: 0.5px solid #e9e9ef;
        }
        .review-question {
            font-weight: 590;
            font-size: 17px;
            line-height: 1.8;
            white-space: pre-wrap;
            margin-bottom: 16px;
            color: #1c1c1e;
        }
        .review-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .review-stats {
            display: flex;
            gap: 20px;
            align-items: center;
            margin: 12px 0;
            font-size: 12px;
            background: #f8f9fc;
            padding: 8px 12px;
            border-radius: 20px;
            flex-wrap: wrap;
        }
        .review-count-badge {
            background: #007aff10;
            padding: 4px 12px;
            border-radius: 20px;
            color: #007aff;
            font-weight: 500;
            cursor: pointer;
        }
        .review-count-badge:hover {
            background: #007aff;
            color: white;
        }
        .review-action-group {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }
        .review-correct-btn {
            background: #34c759;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: white;
        }
        .review-wrong-btn {
            background: #ff3b30;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: white;
        }
        .toggle-details-btn {
            background: #e9e9ef;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #007aff;
            margin-top: 6px;
            margin-right: 12px;
        }
   .details-container {
    margin-top: 12px;
    background: #f9f9fb;
    border-radius: 16px;
    padding: 10px 14px;
    display: none;
    max-height: none;
    overflow: visible;
}

.detail-wrong, .detail-correct {
    overflow: visible;
    word-wrap: break-word;
    max-width: 100%;
}

.detail-wrong img, .detail-correct img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    margin: 8px 0;
}


        .details-container.show {
            display: block;
        }
       .detail-wrong {
    background: #fef2f2;
    padding: 10px 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    font-size: 13px;
    white-space: normal;
    word-wrap: break-word;
    border-left: 3px solid #ff3b30;
    line-height: 1.4;
    max-height: none;
    overflow: auto;
}
.detail-correct {
    background: #ecf7ec;
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 13px;
    white-space: normal;
    word-wrap: break-word;
    border-left: 3px solid #34c759;
    line-height: 1.4;
    max-height: none;
    overflow: auto;
}
        .review-empty {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 32px;
            color: #8e8e93;
        }

        /* 编辑弹窗 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
        }
        .modal-mask.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            width: 90%;
            max-width: 580px;
            max-height: 85vh;
            background: white;
            border-radius: 32px;
            overflow-y: auto;
            padding: 24px 28px 32px;
        }
        .modal-container h4 {
            font-size: 22px;
            font-weight: 590;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #3a3a3e;
            display: block;
            margin-bottom: 6px;
        }
        .auto-height-textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 14px;
            border: 0.5px solid #c6c6c8;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            line-height: 1.5;
            min-height: 80px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 14px;
            border: 0.5px solid #c6c6c8;
            font-size: 15px;
        }
        .reason-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .reason-tag {
            background: #f2f2f6;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            color: #3a3a3e;
        }
        .reason-tag.selected {
            background: #007aff;
            color: white;
        }
        .double-input {
            display: flex;
            gap: 14px;
        }
        .double-input > div {
            flex: 1;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 44px;
            font-weight: 590;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-cancel { background: #e9e9ef; color: #1c1c1e; }
        .btn-save { background: #007aff; color: white; }
        
        /* 历史记录弹窗 */
        .history-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            z-index: 3000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: none;
        }
        .history-modal.show {
            display: block;
        }
        .history-modal h5 {
            font-size: 18px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e9e9ef;
        }
        .history-modal-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .history-modal-item {
            padding: 10px 0;
            border-bottom: 0.5px solid #f0f0f4;
            font-size: 13px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2999;
            display: none;
        }
        .modal-overlay.show {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar { width: 120px; }
            .content-area { padding: 16px; }
            .review-header { flex-direction: column; align-items: flex-start; }
            .review-action-group { margin-left: 0; margin-top: 8px; }
        }

.three-input {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.three-input > div {
    flex: 1;
    min-width: 120px;
}
.three-input label {
    font-size: 13px;
    font-weight: 500;
    color: #3a3a3e;
    display: block;
    margin-bottom: 6px;
}
.three-input input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    border: 0.5px solid #c6c6c8;
    font-size: 14px;
    background: white;
    transition: 0.1s;
}
.three-input input:focus {
    outline: none;
    border-color: #007aff;
    box-shadow: 0 0 0 2px rgba(0,122,255,0.1);
}

/* 单元选择弹窗 */
.unit-modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border-radius: 28px;
    padding: 24px;
    width: 90%;
    max-width: 320px;
    max-height: 70vh;
    overflow-y: auto;
    z-index: 3000;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    display: none;
}
.unit-modal.show {
    display: block;
}
.unit-modal h5 {
    font-size: 18px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e9e9ef;
    text-align: center;
}
.unit-list {
    max-height: 400px;
    overflow-y: auto;
}
.unit-item {
    padding: 12px 16px;
    margin: 4px 0;
    background: #f2f2f6;
    border-radius: 30px;
    cursor: pointer;
    text-align: center;
    font-size: 14px;
    transition: 0.1s;
}
.unit-item:hover {
    background: #007aff;
    color: white;
}

/* 图片上传相关样式 */
.upload-img-btn {
    background: #f2f2f6;
    border: 0.5px solid #e9e9ef;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    color: #007aff;
    transition: 0.1s;
}
.upload-img-btn:hover {
    background: #e9e9ef;
}
.img-preview-area {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
}
.img-preview-item {
    position: relative;
    display: inline-block;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e9e9ef;
}
.img-preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.img-preview-item .remove-img {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 12px;
    text-align: center;
    line-height: 18px;
    cursor: pointer;
}

/* 图片全宽显示 */
.question-container img, .review-question-area img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 12px;
}

.detail-wrong img, .detail-correct img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 12px;
    margin: 8px 0;
}

/* 卡片内图片容器 */
.question-container {
    width: 100%;
}

/* 复习模式图片 */
.review-card .review-question-area img {
    max-height: 250px;
}

/* 禁用双击缩放 */
body {
    touch-action: manipulation;
}

button, .category-tab, .tab-btn, .edit-btn, .review-correct-btn, .review-wrong-btn, .toggle-details-btn, .filter-btn, .close-review, .add-question-btn-header {
    touch-action: manipulation;
}

    </style>
</head>
<body>
<div class="app-wrapper">
<div class="header">
    <div>
        <h1>错题本</h1>
    </div>
    <div style="display: flex; gap: 12px; align-items: center; margin-left: auto;">
        <div style="display: flex; align-items: center; gap: 6px;">
            <span style="font-size: 13px; color: #8e8e93;"></span>
            <select id="headerGradeFilter" style="padding: 4px 8px; border-radius: 16px; border: 0.5px solid #c6c6c8; font-size: 12px; background: white;">
                <option value="全部">全部</option>
                <option value="一上">一上</option>
                <option value="一下" selected>一下</option>
                <option value="二上">二上</option>
                <option value="二下">二下</option>
                <option value="三上">三上</option>

function renderPinyinContent(question, wrongAnswer, correctAnswer) {
    // 提取括号前的汉字和括号内的注释（去掉括号）
    let mainHanzi = question;
    let noteText = '';
    const bracketIndex = question.indexOf('（');
    if (bracketIndex > 0) {
        mainHanzi = question.substring(0, bracketIndex);
        let tempNote = question.substring(bracketIndex + 1);
        if (tempNote.endsWith('）')) {
            tempNote = tempNote.slice(0, -1);
        }
        noteText = tempNote;
    }
    // 也处理英文括号
    const englishBracketIndex = question.indexOf('(');
    if (englishBracketIndex > 0 && (bracketIndex === -1 || englishBracketIndex < bracketIndex)) {
        mainHanzi = question.substring(0, englishBracketIndex);
        let tempNote = question.substring(englishBracketIndex + 1);
        if (tempNote.endsWith(')')) {
            tempNote = tempNote.slice(0, -1);
        }
        noteText = tempNote;
    }
    
    // 将主体汉字分开
    const chars = mainHanzi.split('');
    // 将注释文字也分开
    const noteChars = noteText ? noteText.split('') : [];
    
    let html = `
        <div class="special-content">
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;">
    `;
    
    // 主体汉字：正常显示拼音线
    chars.forEach(char => {
        html += `
            <div style="text-align: center;">
                <div class="four-line-grid" style="width: 50px;">
                    <div class="grid-line-1"></div>
                    <div class="grid-line-2"></div>
                    <div class="grid-line-3"></div>
                    <div class="grid-line-4"></div>
                    <div class="pinyin-text" style="visibility: hidden; height: 20px;">&nbsp;</div>
                </div>
                <div style="font-size: 24px; font-weight: 500; margin-top: -24px; color: #1c1c1e;">
                    ${escapeHtml(char)}
                </div>
            </div>
        `;
    });
    
    // 注释文字：文字黑色，拼音线透明
    noteChars.forEach(char => {
        html += `
            <div style="text-align: center;">
                <div class="four-line-grid" style="width: 50px;">
                    <div class="grid-line-1" style="border-top: 1px solid transparent;"></div>
                    <div class="grid-line-2" style="border-top: 1px solid transparent;"></div>
                    <div class="grid-line-3" style="border-top: 1px solid transparent;"></div>
                    <div class="grid-line-4" style="border-top: 1px solid transparent;"></div>
                    <div class="pinyin-text" style="visibility: hidden; height: 20px;">&nbsp;</div>
                </div>
                <div style="font-size: 24px; font-weight: 500; margin-top: -24px; color: #1c1c1e;">
                    ${escapeHtml(char)}
                </div>
            </div>
        `;
    });
    
    html += `
            </div>
        </div>
    `;
    
    return html;
}

function getFilteredQuestionsForReview() {
    let baseList = currentSubject === "chinese" ? [...chineseErrors] : [...mathErrors];
    
    if (reviewContextFilter) {
        baseList = baseList.filter(q => q.tag === reviewContextFilter);
        if (reviewContextFilter === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
            baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
        }
    } else {
        if (currentSubject === "chinese") {
            baseList = baseList.filter(q => q.tag === currentChineseTag);
            if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
                baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
            }
        }
    }
    
    const todayDate = new Date(); todayDate.setHours(0,0,0,0);
    if (currentFilter === "today") {
        return baseList.filter(q => { const d = new Date(q.date); d.setHours(0,0,0,0); return d.getTime() === todayDate.getTime(); });
    }
    if (currentFilter === "week") {
        const startOfWeek = new Date(todayDate); startOfWeek.setDate(todayDate.getDate() - todayDate.getDay());
        return baseList.filter(q => { const d = new Date(q.date); return d >= startOfWeek; });
    }
    if (currentFilter === "month") {
        return baseList.filter(q => { const d = new Date(q.date); return d.getMonth() === todayDate.getMonth() && d.getFullYear() === todayDate.getFullYear(); });
    }
    if (currentFilter === "unit" && customUnitKeyword) {
        return baseList.filter(q => q.unit && q.unit.includes(customUnitKeyword));
    }
    
    return baseList;
}


// 获取当前显示的所有单元（去重）
function getAllUnits() {
    let baseList = currentSubject === "chinese" ? chineseErrors : mathErrors;
    
    // 按当前页面分类筛选（与复习模式保持一致）
    if (reviewContextFilter) {
        baseList = baseList.filter(q => q.tag === reviewContextFilter);
        if (reviewContextFilter === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
            baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
        }
    } else {
        if (currentSubject === "chinese") {
            baseList = baseList.filter(q => q.tag === currentChineseTag);
            if (currentChineseTag === "基础知识" && currentChineseSubTag && currentChineseSubTag !== "全部") {
                baseList = baseList.filter(q => q.subTag === currentChineseSubTag);
            }
        }
    }
    
    // 提取所有有单元的项目
    const unitsSet = new Set();
    baseList.forEach(item => {
        if (item.unit && item.unit.trim()) {
            unitsSet.add(item.unit);
        }
    });
    return Array.from(unitsSet).sort();
}

// 首字母大写
function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
}

// 图片压缩函数（压缩到200KB以内）
function compressImageTo200KB(file, callback) {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            let quality = 0.7;
            let width = img.width;
            let height = img.height;
            
            // 限制最大宽度为800px
            const maxWidth = 800;
            if (width > maxWidth) {
                height = (height * maxWidth) / width;
                width = maxWidth;
            }
            
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            function tryCompress(q) {
                const dataUrl = canvas.toDataURL('image/jpeg', q);
                // 估算大小（Base64长度 * 0.75 ≈ 字节数）
                const estimatedSize = dataUrl.length * 0.75;
                if (estimatedSize > 200000 && q > 0.3) {
                    tryCompress(q - 0.1);
                } else {
                    callback(dataUrl);
                }
            }
            tryCompress(quality);
        };
        img.src = e.target.result;
    };
}






function dataURItoBlob(dataURI) {
    const byteString = atob(dataURI.split(',')[1]);
    const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
    }
    return new Blob([ab], { type: mimeString });
}



// 处理图片上传 - 压缩后上传到 GitHub
async function handleImageUpload(event, target) {
    const file = event.target.files[0];
    if (!file) return;
    
    if (!file.type.startsWith('image/')) {
        alert('请上传图片文件');
        return;
    }
    
    const btn = document.querySelector(`.upload-img-btn[data-target="${target}"]`);
    const originalText = btn.textContent;
    btn.textContent = '⏳ 压缩上传中...';
    btn.disabled = true;
    
    try {
        compressImageTo200KB(file, async (compressedBase64) => {
            try {
                // 生成唯一文件名
                const ext = file.name.split('.').pop() || 'jpg';
                const fileName = `images/${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${ext}`;
                
                // 上传到 GitHub
                const imageUrl = await uploadToGitHub(compressedBase64, fileName);
                
                if (!tempImages[target]) tempImages[target] = [];
                tempImages[target].push(imageUrl);
                renderImagePreview(target);
                
                alert('✅ 图片已上传到 GitHub 云端！');
            } catch (err) {
                console.error('上传错误:', err);
                alert('❌ 上传失败：' + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
                event.target.value = '';
            }
        });
    } catch (err) {
        alert('❌ 压缩失败');
        btn.textContent = originalText;
        btn.disabled = false;
        event.target.value = '';
    }
}


// 渲染图片预览
function renderImagePreview(target) {
    const container = document.getElementById(`${target}ImgPreview`);
    if (!container) return;
    
    const images = tempImages[target] || [];
    if (images.length === 0) {
        container.innerHTML = '';
        return;
    }
    
    let html = '';
    images.forEach((img, idx) => {
        html += `
            <div class="img-preview-item">
                <img src="${img}" alt="预览图">
                <div class="remove-img" data-target="${target}" data-index="${idx}">×</div>
            </div>
        `;
    });
    container.innerHTML = html;
    
    // 绑定删除事件
    container.querySelectorAll('.remove-img').forEach(el => {
        el.onclick = (e) => {
            e.stopPropagation();
            const t = el.getAttribute('data-target');
            const idx = parseInt(el.getAttribute('data-index'));
            if (tempImages[t] && tempImages[t][idx]) {
                tempImages[t].splice(idx, 1);
                renderImagePreview(t);
            }
        };
    });
}

function renderImagesInCard(images, title = '', size = 'normal') {
    if (!images || images.length === 0) return '';
    
    let html = `<div style="margin-top: 12px; width: 100%;">`;
    if (title) {
        html += `<div style="font-size: 13px; color: #8e8e93; margin-bottom: 8px; font-weight: 500;">📷 ${title}：</div>`;
    }
    
    // 全宽大图模式：图片占满卡片宽度
    if (size === 'full') {
        html += `<div style="display: flex; flex-direction: column; gap: 12px; width: 100%;">`;
        images.forEach((img, idx) => {
            html += `
                <div style="width: 100%; border-radius: 12px; overflow: hidden; background: #f8f9fc; border: 0.5px solid #e9e9ef; cursor: pointer;" onclick="window.open('${img}')">
                    <img src="${img}" style="width: 100%; max-height: 300px; object-fit: contain; display: block;" alt="图片${idx+1}">
                </div>
            `;
        });
        html += `</div>`;
    } 
    // 正常模式：网格排列
    else {
        html += `<div style="display: flex; gap: 10px; flex-wrap: wrap;">`;
        images.forEach((img, idx) => {
            html += `
                <div style="width: 100px; height: 100px; border-radius: 8px; overflow: hidden; border: 0.5px solid #e9e9ef; cursor: pointer;" onclick="window.open('${img}')">
                    <img src="${img}" style="width: 100%; height: 100%; object-fit: cover;" alt="图片${idx+1}">
                </div>
            `;
        });
        html += `</div>`;
    }
    
    html += `</div>`;
    return html;
}


// 保存文字数据到 Gist
async function saveToCloud() {
    if (!GIST_CONFIG.id) {
        console.log('请先配置 GIST_CONFIG.id');
        return;
    }
    
    const data = {
        chineseErrors: chineseErrors,
        mathErrors: mathErrors,
        lastUpdate: new Date().toISOString(),
        version: '1.0'
    };
    
    const content = JSON.stringify(data, null, 2);
    
    let sha = '';
    try {
        const getResponse = await fetch(`https://api.github.com/gists/${GIST_CONFIG.id}`);
        if (getResponse.ok) {
            const gist = await getResponse.json();
            sha = gist.files[GIST_CONFIG.fileName]?.sha || '';
        }
    } catch (e) {
        console.log('获取 Gist 信息失败', e);
    }
    
    const response = await fetch(`https://api.github.com/gists/${GIST_CONFIG.id}`, {
        method: 'PATCH',
        headers: {
            'Authorization': `token ${GIST_CONFIG.token}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            files: {
                [GIST_CONFIG.fileName]: {
                    content: content,
                    sha: sha
                }
            }
        })
    });
    
    if (response.ok) {
        console.log('✅ 文字数据已同步到 Gist');
    } else {
        const error = await response.json();
        console.error('同步失败:', error);
    }
}

async function loadFromCloud() {
    if (!GIST_CONFIG.id) {
        console.log('请先配置 GIST_CONFIG.id');
        return false;
    }
    
    try {
        const rawUrl = `https://gist.githubusercontent.com/Linnea0123/${GIST_CONFIG.id}/raw/${GIST_CONFIG.fileName}`;
        const response = await fetch(rawUrl);
        
        if (response.ok) {
            const data = await response.json();
            // 合并云端数据到本地，而不是覆盖
            if (data.chineseErrors && data.chineseErrors.length > 0) {
                // 如果本地没有数据，才使用云端数据
                if (chineseErrors.length === 0) {
                    data.chineseErrors.forEach(item => {
                        chineseErrors.push({
                            ...item,
                            questionImages: item.questionImages || [],
                            wrongImages: item.wrongImages || [],
                            correctImages: item.correctImages || []
                        });
                    });
                }
            }
            if (data.mathErrors && data.mathErrors.length > 0) {
                if (mathErrors.length === 0) {
                    data.mathErrors.forEach(item => mathErrors.push(item));
                }
            }
            renderSidebar();
            renderContent();
            console.log('✅ 已从 Gist 加载文字数据');
            return true;
        }
    } catch (err) {
        console.error('加载失败:', err);
    }
    return false;
}


// 强制从云端加载并覆盖本地数据
async function loadFromCloudForce() {
    if (!GIST_CONFIG.id) {
        alert('请先配置 Gist ID');
        return false;
    }
    
    try {
        const rawUrl = `https://gist.githubusercontent.com/Linnea0123/${GIST_CONFIG.id}/raw/${GIST_CONFIG.fileName}`;
        const response = await fetch(rawUrl);
        
        if (response.ok) {
            const data = await response.json();
            // 强制覆盖本地数据
            if (data.chineseErrors) {
                chineseErrors.length = 0;
                data.chineseErrors.forEach(item => {
                    chineseErrors.push({
                        ...item,
                        questionImages: item.questionImages || [],
                        wrongImages: item.wrongImages || [],
                        correctImages: item.correctImages || []
                    });
                });
            }
            if (data.mathErrors) {
                mathErrors.length = 0;
                data.mathErrors.forEach(item => {
                    mathErrors.push({
                        ...item,
                        questionImages: item.questionImages || [],
                        wrongImages: item.wrongImages || [],
                        correctImages: item.correctImages || []
                    });
                });
            }
            saveAllDataToLocalStorage();
            renderSidebar();
            renderContent();
            if (reviewModal.classList.contains('active')) {
                openReviewWithCurrentFilter();
            }
            console.log('✅ 已从云端强制恢复数据');
            return true;
        } else {
            throw new Error('云端无数据或获取失败');
        }
    } catch (err) {
        console.error('恢复失败:', err);
        throw err;
    }
}

// ========== 数据持久化到 localStorage ==========
function saveAllDataToLocalStorage() {
    try {
        const dataToSave = {
            chineseErrors: chineseErrors,
            mathErrors: mathErrors,
            version: '1.0',
            lastSaved: new Date().toISOString()
        };
        localStorage.setItem('cuoti_data', JSON.stringify(dataToSave));
        console.log('✅ 数据已保存到本地');
    } catch (e) {
        if (e.name === 'QuotaExceededError') {
            alert('存储空间不足！图片太多，请删除一些旧错题。');
        } else {
            console.error('保存失败:', e);
        }
    }
}

function loadAllDataFromLocalStorage() {
    const saved = localStorage.getItem('cuoti_data');
    if (saved) {
        try {
            const data = JSON.parse(saved);
            console.log('从localStorage加载的原始数据:', data);
            
            if (data.chineseErrors) {
                chineseErrors.length = 0;
                data.chineseErrors.forEach((item, idx) => {
                    const newItem = {
                        ...item,
                        questionImages: item.questionImages || [],
                        wrongImages: item.wrongImages || [],
                        correctImages: item.correctImages || []
                    };
                    chineseErrors.push(newItem);
                    console.log(`第${idx}条错题图片:`, newItem.questionImages);
                });
            }
            if (data.mathErrors) {
                mathErrors.length = 0;
                data.mathErrors.forEach(item => {
                    mathErrors.push({
                        ...item,
                        questionImages: item.questionImages || [],
                        wrongImages: item.wrongImages || [],
                        correctImages: item.correctImages || []
                    });
                });
            }
            console.log('✅ 已从本地加载数据，语文错题数量:', chineseErrors.length);
            console.log('最后一条错题的图片:', chineseErrors[chineseErrors.length-1]?.questionImages);
            return true;
        } catch (e) {
            console.error('加载失败:', e);
        }
    }
    return false;
}
